<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QM AI 에이전트 포털</title>
  <style>
    :root {
      --navy: #344a8c;
      --navy-dark: #26386a;
      --line: #d8dce5;
      --bg: #eef1f6;
      --white: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --blue-soft: #e9f1ff;
      --green-soft: #eef8ef;
      --orange-soft: #fff4e8;
      --shadow: 0 10px 24px rgba(31, 41, 55, 0.08);
      --overlay: rgba(15, 23, 42, 0.52);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, a { font: inherit; }
    .hidden { display: none !important; }

    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    .topbar {
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      text-decoration: none;
      transition: .2s ease;
    }

    .brand:hover {
      background: rgba(255,255,255,.18);
    }

    .brand-title {
      font-weight: 800;
      font-size: 15px;
      letter-spacing: .2px;
      white-space: nowrap;
    }

    .brand-badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .brand .icon {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: rgba(255,255,255,.14);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .user-chip {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .top-btn {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }

    .top-btn-primary {
      background: #fff;
      color: var(--navy-dark);
    }

    .top-btn-primary:hover {
      background: #eef3fb;
    }

    .top-btn-outline {
      background: rgba(255,255,255,.10);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
    }

    .top-btn-outline:hover {
      background: rgba(255,255,255,.18);
    }

    .content {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }

    .sidebar {
      background: #f0f2f7;
      border-right: 1px solid #cdd5e2;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .side-head {
      background: var(--navy);
      color: #fff;
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .side-title {
      margin-bottom: 10px;
    }

    .side-title strong {
      font-size: 14px;
    }

    .search-input-wrap {
      position: relative;
    }

    .search-box input {
      width: 100%;
      border: 1px solid #b8c3d9;
      border-radius: 10px;
      padding: 10px 40px 10px 12px;
      font-size: 14px;
      outline: none;
    }

    .search-box input:focus,
    .login-input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 4px rgba(52,74,140,.08);
    }

    .search-clear-btn {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      display: none;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 999px;
      background: #dfe7f1;
      color: #334155;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .search-clear-btn:hover {
      background: #cfd9e5;
    }

    .tree-wrap {
      padding: 10px 10px 14px;
      overflow: auto;
      min-height: 0;
    }

    .tree-section-title {
      font-size: 12px;
      font-weight: 800;
      color: #5f6b84;
      text-transform: uppercase;
      margin: 10px 8px 8px;
    }

    details { margin-bottom: 4px; border-radius: 8px; }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      color: #24314f;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    summary::-webkit-details-marker { display: none; }
    summary:hover { background: #e6ebf5; }

    .folder::before {
      content: "▸";
      font-size: 11px;
      color: #55627d;
    }

    details[open] > summary.folder::before {
      content: "▾";
    }

    .node-icon {
      color: #40598f;
      font-size: 15px;
      width: 18px;
      text-align: center;
    }

    .subtree {
      margin-left: 16px;
      border-left: 1px dashed #c8d0df;
      padding-left: 8px;
      margin-bottom: 6px;
    }

    .tree-link,
    .tree-home {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #24314f;
      cursor: pointer;
      text-decoration: none;
    }

    .tree-link:hover,
    .tree-home:hover {
      background: #e6ebf5;
    }

    .tree-link.active,
    .tree-home.active {
      background: #d8e6ff;
      color: #133f7d;
      font-weight: 800;
    }

    .tree-note {
      display: block;
      font-size: 11px;
      color: #7c879d;
      padding: 2px 10px 8px 38px;
      line-height: 1.6;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 0;
      background: #edf0f5;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      background: #fff;
      border: 1px solid var(--line);
      border-bottom: none;
      padding: 10px 14px;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      color: #24314f;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace {
      padding: 16px;
      overflow: auto;
      min-height: 0;
    }

    .screen {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      min-height: calc(100vh - 130px);
      overflow: hidden;
    }

    .screen-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f9fbff, #f3f6fb);
    }

    .screen-head h1 {
      margin: 0 0 6px;
      font-size: 26px;
      color: #22365e;
    }

    .screen-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .screen-body {
      padding: 20px 22px 24px;
    }

    .callout {
      border: 1px solid #cfe0ff;
      background: #f5f9ff;
      color: #24436f;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      font-size: 14px;
      line-height: 1.7;
    }

    .warn-callout {
      border-color: #fed7aa;
      background: #fff7ed;
      color: #9a3412;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
    }

    .kpi strong {
      display: block;
      font-size: 28px;
      color: #233f7a;
      margin-bottom: 4px;
    }

    .kpi span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #22365e;
    }

    .card-list {
      display: grid;
      gap: 12px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fbfcfe;
    }

    .mini-card strong {
      display: block;
      margin-bottom: 4px;
      color: #22365e;
      font-size: 15px;
    }

    .mini-card p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #e4e8f0;
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      line-height: 1.7;
    }

    th {
      background: #f6f8fc;
      color: #33445f;
      font-size: 12px;
      text-transform: uppercase;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .b-blue { background: var(--blue-soft); color: #164886; }
    .b-green { background: var(--green-soft); color: #2d6b39; }
    .b-orange { background: var(--orange-soft); color: #8a5317; }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      border: 1px solid #c6d0e0;
      background: #fff;
      color: #24314f;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: .2s ease;
    }

    .btn:hover {
      background: #f5f8ff;
    }

    .btn.primary {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }

    .btn.primary:hover {
      background: var(--navy-dark);
    }

    .flow-box {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .flow-step {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfe;
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
    }

    .flow-step strong {
      display: block;
      color: #22365e;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .qa-menu-grid,
    .part-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .qa-process,
    .part-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }

    .qa-process-head,
    .part-card-head {
      padding: 14px 16px;
      background: #f5f8ff;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
      color: #24436f;
    }

    .qa-process-body,
    .part-card-body {
      padding: 12px 14px;
      display: grid;
      gap: 8px;
    }

    .qa-process-body button,
    .qa-process-body a,
    .part-card-body button {
      width: 100%;
      text-align: left;
      border: 1px solid #d7dfec;
      background: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      color: #23324e;
      text-decoration: none;
      cursor: pointer;
      transition: .2s ease;
    }

    .qa-process-body button:hover,
    .qa-process-body a:hover,
    .part-card-body button:hover {
      background: #eef5ff;
    }

    .login-required-box {
      margin-top: 14px;
      padding: 16px;
      border: 1px dashed #bfd3f7;
      border-radius: 12px;
      background: #f8fbff;
      text-align: center;
    }

    .login-required-box strong {
      display: block;
      color: #22365e;
      margin-bottom: 8px;
    }

    .empty-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .portal-footer {
      padding: 0 16px 18px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.8;
      text-align: center;
    }

    .portal-footer strong {
      color: var(--navy-dark);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--overlay);
    }

    .modal-card {
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 24px 50px rgba(15, 23, 42, .24);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 14px;
      border-bottom: 1px solid #e9eef5;
    }

    .modal-title {
      margin: 0;
      color: var(--navy-dark);
      font-size: 22px;
    }

    .modal-desc {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .modal-close {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 999px;
      background: #eef2f6;
      color: #344054;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: #dfe7f1;
    }

    .modal-body {
      display: grid;
      gap: 12px;
      padding: 18px 20px 22px;
    }

    .login-input {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid #cfd9e5;
      border-radius: 14px;
      outline: none;
      font-size: 14px;
      transition: .2s ease;
    }

    .login-help {
      margin-top: -2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .login-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .login-btn {
      flex: 1;
      padding: 13px 16px;
      border-radius: 14px;
      border: none;
      background: var(--navy);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: .2s ease;
    }

    .login-btn:hover {
      background: var(--navy-dark);
    }

    .login-btn:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    .login-btn-secondary {
      background: #eef2f6;
      color: #344054;
    }

    .login-btn-secondary:hover {
      background: #dfe7f1;
    }


    .embedded-page-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .embedded-page-frame {
      display: block;
      width: 100%;
      min-height: 1120px;
      border: 0;
      background: #fff;
    }

    @media (max-width: 1200px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .panel-grid,
      .qa-menu-grid,
      .part-grid { grid-template-columns: 1fr; }
      .flow-box { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid #cdd5e2;
      }

      .tree-wrap {
        max-height: none;
      }

      .screen {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        padding: 0 12px;
      }

      .brand {
        padding: 8px 10px;
      }

      .brand-title {
        font-size: 13px;
      }

      .top-right {
        gap: 8px;
      }

      .top-btn,
      .top-btn-outline,
      .top-btn-primary {
        padding: 8px 10px;
        font-size: 13px;
      }

      .tabs {
        padding: 8px 10px 0;
      }

      .workspace {
        padding: 12px;
      }

      .screen-head,
      .screen-body {
        padding-left: 16px;
        padding-right: 16px;
      }

      .screen-head h1 {
        font-size: 22px;
      }

      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .flow-box {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .login-row {
        flex-direction: column;
      }

      .login-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="brand" href="https://hakqm.github.io/" title="메인으로 이동">
        <span class="brand-title">HAK QM AI AGENT</span>
        <span class="brand-badge">메인</span>
      </a>

      <div class="top-right">
        <div id="userChip" class="user-chip hidden">
          <span id="userChipText">로그인됨</span>
        </div>
        <button type="button" id="openLoginBtn" class="top-btn top-btn-primary">로그인</button>
        <button type="button" id="logoutBtn" class="top-btn top-btn-outline hidden">로그아웃</button>
      </div>
    </div>

    <div class="content">
      <aside class="sidebar">
        <div class="side-head">
          <div class="search-box">
            <div class="search-input-wrap">
              <input type="text" id="menuSearch" placeholder="메뉴 검색..." />
              <button type="button" id="clearMenuSearch" class="search-clear-btn" aria-label="검색 초기화">×</button>
            </div>
          </div>
        </div>

        <div class="tree-wrap">
          <div class="tree-section-title">Menu</div>
          <button class="tree-home active" data-screen="home">🏠 Home</button>

          <details>
            <summary class="folder"><span class="node-icon">📁</span> QA</summary>
            <div class="subtree">
              <button class="tree-link" data-screen="qa_overview">🔗 QA 업무 FLOW</button>

              <details>
                <summary class="folder"><span class="node-icon">🧪</span> Test</summary>
                <div class="subtree">
                  <button type="button" class="tree-link" data-screen="qa_test_qr_embed" onclick="protectedOpenScreen('qa_test_qr_embed')">🌐 QR 생성기</button>
                </div>
              </details>

              <details>
                <summary class="folder"><span class="node-icon">📂</span> 수입검사</summary>
                <div class="subtree">
                  <button class="tree-link" data-screen="qa_001_1">🔗 고객사양 확인</button>
                  <button class="tree-link" data-screen="qa_001_2">🔗 실물검사</button>
                  <button class="tree-link" data-screen="qa_001_3">🔗 결과등록</button>
                </div>
              </details>

              <details>
                <summary class="folder"><span class="node-icon">📂</span> 협력업체평가</summary>
                <div class="subtree">
                  <button class="tree-link" data-screen="qa_002_1">🔗 서류 평가</button>
                  <button class="tree-link" data-screen="qa_002_2">🔗 협력업체 실사</button>
                  <button class="tree-link" data-screen="qa_002_3">🔗 정기 평가</button>
                </div>
              </details>

              <details>
                <summary class="folder"><span class="node-icon">📂</span> 내부심사</summary>
                <div class="subtree">
                  <button class="tree-link" data-screen="qa_003_1">🔗 내부심사 계획</button>
                  <button class="tree-link" data-screen="qa_003_2">🔗 내부심사 실시</button>
                  <button class="tree-link" data-screen="qa_003_3">🔗 내부심사 결과</button>
                </div>
              </details>

              <details>
                <summary class="folder"><span class="node-icon">📂</span> ISO 인증심사</summary>
                <div class="subtree">
                  <button class="tree-link" data-screen="qa_004_1">🔗 심사 신청</button>
                  <button class="tree-link" data-screen="qa_004_2">🔗 심사 확정 및 일정</button>
                  <button class="tree-link" data-screen="qa_004_3">🔗 심사 진행</button>
                  <button class="tree-link" data-screen="qa_004_4">🔗 심사 결과</button>
                </div>
              </details>

    function setLoginSubmitting(isSubmitting) {
      isLoginSubmitting = isSubmitting;
      submitLoginBtn.disabled = isSubmitting;
      submitLoginBtn.textContent = isSubmitting ? "로그인 중..." : "로그인";
      loginNameInput.disabled = isSubmitting;
      loginEmpNoInput.disabled = isSubmitting;
    }

    function openLoginModal() {
      loginModal.classList.remove("hidden");
      loginModal.setAttribute("aria-hidden", "false");
      setTimeout(() => loginNameInput.focus(), 50);
    }

    function closeLoginModal() {
      loginModal.classList.add("hidden");
      loginModal.setAttribute("aria-hidden", "true");
    }

    function updateLoginUI() {
      if (currentUserData) {
        userChip.classList.remove("hidden");
        logoutBtn.classList.remove("hidden");
        openLoginBtn.classList.add("hidden");
        userChipText.textContent = `${currentUserData.team} · ${currentUserData.name}님`;
        closeLoginModal();
        return;
      }

      userChip.classList.add("hidden");
      logoutBtn.classList.add("hidden");
      openLoginBtn.classList.remove("hidden");
      userChipText.textContent = "로그인됨";
    }

    function saveLoginUser(user) {
      currentUserData = user;
      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify({
        user,
        lastActivity: Date.now()
      }));
      updateLoginUI();
    }

    function clearLoginData() {
      currentUserData = null;
      localStorage.removeItem(LOGIN_STORAGE_KEY);
    }

    function touchLoginActivity() {
      if (!currentUserData) return;

      const saved = localStorage.getItem(LOGIN_STORAGE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        parsed.lastActivity = Date.now();
        localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(parsed));
      } catch (error) {
        clearLoginData();
      }
    }

    function loadSavedUser() {
      const saved = localStorage.getItem(LOGIN_STORAGE_KEY);

      if (!saved) {
        updateLoginUI();
        return;
      }

      try {
        const parsed = JSON.parse(saved);
        const user = parsed.user;
        const lastActivity = parsed.lastActivity || 0;

        if (!user || !lastActivity) {
          clearLoginData();
          updateLoginUI();
          return;
        }

        if (Date.now() - lastActivity > LOGIN_EXPIRE_MS) {
          clearLoginData();
          updateLoginUI();
          alert("로그인 세션이 만료되어 자동으로 로그아웃되었습니다. 다시 로그인해주세요.");
          return;
        }

        currentUserData = user;
        touchLoginActivity();
      } catch (error) {
        clearLoginData();
      }

      updateLoginUI();
    }

    function logout(showMessage = true) {
      clearLoginData();
      pendingAction = null;
      loginNameInput.value = "";
      loginEmpNoInput.value = "";
      updateLoginUI();

      if (showMessage) {
        alert("로그아웃되었습니다.");
      }
    }

    function autoLogout() {
      logout(false);
      alert("일정 시간 동안 사용 기록이 없어 로그인 세션이 종료되었습니다. 다시 로그인해주세요.");
    }

    function startAutoLogoutWatcher() {
      setInterval(() => {
        if (!currentUserData) return;

        const saved = localStorage.getItem(LOGIN_STORAGE_KEY);
        if (!saved) {
          logout(false);
          return;
        }

        try {
          const parsed = JSON.parse(saved);
          const lastActivity = parsed.lastActivity || 0;
          if (Date.now() - lastActivity > LOGIN_EXPIRE_MS) {
            autoLogout();
          }
        } catch (error) {
          logout(false);
        }
      }, 60000);
    }

    function bindActivityEvents() {
      ["click", "keydown", "touchstart", "scroll"].forEach((eventName) => {
        document.addEventListener(eventName, () => touchLoginActivity(), { passive: true });
      });
    }

    function jsonpRequest(url, callbackName) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const uniqueCallback = `${callbackName}_${Date.now()}_${Math.floor(Math.random() * 1000)}`;

        window[uniqueCallback] = function(result) {
          resolve(result);
          delete window[uniqueCallback];
          script.remove();
        };

        script.src = `${url}&callback=${uniqueCallback}`;
        script.onerror = function() {
          reject(new Error("Apps Script 연결 오류"));
          delete window[uniqueCallback];
          script.remove();
        };

        document.body.appendChild(script);
      });
    }

    async function login() {
      const name = loginNameInput.value.trim();
      const empNo = loginEmpNoInput.value.trim();

      if (!name || !empNo) {
        alert("이름과 사번을 입력해주세요.");
        return;
      }

      if (isLoginSubmitting) return;
      setLoginSubmitting(true);

      try {
        const url = `${WEB_APP_URL}?action=login&name=${encodeURIComponent(name)}&emp_no=${encodeURIComponent(empNo)}`;
        const result = await jsonpRequest(url, "loginCallback");

        if (!result.success) {
          alert(result.message || "로그인에 실패했습니다.");
          return;
        }

        saveLoginUser(result.user);
        alert("로그인되었습니다.");
        runPendingAction();
      } catch (error) {
        console.error(error);
        alert("로그인 중 오류가 발생했습니다.");
      } finally {
        setLoginSubmitting(false);
      }
    }

    function requireLogin(actionObject) {
      if (currentUserData) {
        touchLoginActivity();
        runAction(actionObject);
        return;
      }

      pendingAction = actionObject;
      openLoginModal();
      alert("로그인이 필요합니다. 로그인 후 선택한 메뉴가 자동으로 실행됩니다.");
    }

    function runPendingAction() {
      if (!pendingAction || !currentUserData) return;
      const action = pendingAction;
      pendingAction = null;
      runAction(action);
    }

    function runAction(actionObject) {
      if (!actionObject) return;

      if (actionObject.type === "screen") {
        openScreen(actionObject.key);
        return;
      }

      if (actionObject.type === "url") {
        window.location.href = actionObject.url;
      }
    }

    const GENERATED_PART_ORDER = ["merchant", "navy", "marine", "hvac", "fan", "fuelcell"];

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatText(value) {
      const safe = String(value == null || value === "" ? "-" : value);
      return escapeHtml(safe).replace(/\n/g, "<br />");
    }

    function normalizeDash(value) {
      const text = String(value == null ? "" : value).trim();
      return text || "-";
    }

    function makeFlowScreenKey(partKey, pid, step) {
      const pidSuffix = String(pid || "")
        .split("-")
        .slice(1)
        .join("-")
        .replace(/[^0-9a-zA-Z가-힣]/g, "_");
      return `${partKey}_${pidSuffix}_${String(step).replace(/[^0-9a-zA-Z가-힣]/g, "_")}`;
    }

    function getFlowLabel(items, item) {
      const taskName = normalizeDash(item.task);
      const duplicateCount = items.filter((entry) => normalizeDash(entry.task) === taskName).length;
      const baseText = !item.task || duplicateCount > 1 ? normalizeDash(item.work) : taskName;
      return `${item.step}. ${baseText}`;
    }

    function getPartSystemSummary(part) {
      const systems = [];
      part.processes.forEach((process) => {
        process.items.forEach((item) => {
          const system = normalizeDash(item.system);
          if (system !== "-" && !systems.includes(system)) systems.push(system);
        });
      });
      return systems.length ? systems.slice(0, 3).join(", ") : "-";
    }

    function renderGeneratedPartMenus() {
      const container = document.getElementById("generatedPartMenus");
      if (!container) return;

      container.innerHTML = GENERATED_PART_ORDER.map((partKey) => {
        const part = PART_FLOW_DATA[partKey];
        const processHtml = part.processes.map((process) => `
          <details>
            <summary class="folder"><span class="node-icon">📂</span> ${escapeHtml(process.process)}</summary>
            <div class="subtree">
              ${process.items.map((item) => `
                <button class="tree-link" data-screen="${makeFlowScreenKey(partKey, process.pid, item.step)}">🔗 ${escapeHtml(getFlowLabel(process.items, item))}</button>
              `).join("")}
            </div>
          </details>
        `).join("");

        return `
          <details>
            <summary class="folder"><span class="node-icon">📁</span> ${escapeHtml(part.partName)}</summary>
            <div class="subtree">
              <button class="tree-link" data-screen="${partKey}_overview">🔗 ${escapeHtml(part.partName)} 업무 FLOW</button>
              ${processHtml}
            </div>
          </details>
        `;
      }).join("");
    }

    function partOverview(partKey) {
      const part = PART_FLOW_DATA[partKey];
      if (!part) return "";

      const totalProcesses = part.processes.length;
      const totalSteps = part.processes.reduce((sum, process) => sum + process.items.length, 0);
      const systemSummary = getPartSystemSummary(part);

      const processCards = part.processes.map((process) => `
        <div class="part-card">
          <div class="part-card-head">${escapeHtml(process.pid)} · ${escapeHtml(process.process)}</div>
          <div class="part-card-body">
            ${process.items.map((item) => `
              <button onclick="protectedOpenScreen('${makeFlowScreenKey(partKey, process.pid, item.step)}')">${escapeHtml(getFlowLabel(process.items, item))}</button>
            `).join("")}
          </div>
        </div>
      `).join("");

      const summaryRows = part.processes.map((process) => `
        <tr>
          <td>${escapeHtml(process.pid)}</td>
          <td>${escapeHtml(process.process)}</td>
          <td>${process.items.length}</td>
          <td>${escapeHtml(process.items.map((item) => getFlowLabel(process.items, item)).join(", "))}</td>
        </tr>
      `).join("");

      return `
        <div class="screen-head">
          <h1>${escapeHtml(part.partName)} 업무 FLOW</h1>
          <p>${escapeHtml(part.overviewDesc)}</p>
        </div>
        <div class="screen-body">
          <div class="callout">
            <strong>${escapeHtml(part.partName)}</strong> 파트의 전체 업무 흐름을 프로세스별로 정리했습니다.
          </div>

          <div class="kpi-grid">
            <div class="kpi"><strong>${totalProcesses}</strong><span>프로세스 수</span></div>
            <div class="kpi"><strong>${totalSteps}</strong><span>세부 단계 수</span></div>
            <div class="kpi"><strong>${escapeHtml(part.partLabel)}</strong><span>파트 명칭</span></div>
            <div class="kpi"><strong>${escapeHtml(systemSummary)}</strong><span>주요 연관 시스템</span></div>
          </div>

          <div class="panel-grid">
            <div class="panel">
              <h3>프로세스별 업무</h3>
              <div class="part-grid">
                ${processCards}
              </div>
            </div>

            <div class="panel">
              <h3>프로세스 요약</h3>
              <div class="table-wrap">
                <table>
                  <tr><th>프로세스 ID</th><th>프로세스</th><th>단계 수</th><th>세부 업무</th></tr>
                  ${summaryRows}
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function getFlowEntry(partKey, pid, step) {
      const part = PART_FLOW_DATA[partKey];
      if (!part) return null;

      for (const process of part.processes) {
        if (process.pid !== pid) continue;
        const item = process.items.find((entry) => String(entry.step) === String(step));
        if (item) return { part, process, item };
      }

      return null;
    }

    function partFlowScreen(partKey, pid, step) {
      const entry = getFlowEntry(partKey, pid, step);
      if (!entry) return "";

      const { part, process, item } = entry;
      const label = getFlowLabel(process.items, item);
      const relatedRows = process.items.map((relatedItem) => {
        const relatedLabel = getFlowLabel(process.items, relatedItem);
        const currentCell = String(relatedItem.step) === String(step)
          ? `<strong>${escapeHtml(relatedLabel)}</strong>`
          : escapeHtml(relatedLabel);

        return `
          <tr>
            <td>${formatText(relatedItem.step)}</td>
            <td>${currentCell}</td>
            <td>${formatText(relatedItem.work)}</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="screen-head">
          <h1>${escapeHtml(part.partName)} / ${escapeHtml(process.process)} / ${escapeHtml(label)}</h1>
          <p>${escapeHtml(process.pid)} · ${escapeHtml(item.work)}</p>
        </div>
        <div class="screen-body">
          <div class="callout">
            <strong>업무 개요:</strong> ${escapeHtml(item.work)}
          </div>

          <div class="panel-grid">
            <div class="panel">
              <h3>업무 정보</h3>
              <div class="table-wrap">
                <table>
                  <tr><th>항목</th><th>내용</th></tr>
                  <tr><td>프로세스 ID</td><td>${formatText(process.pid)}</td></tr>
                  <tr><td>파트</td><td>${formatText(part.partLabel)}</td></tr>
                  <tr><td>프로세스</td><td>${formatText(process.process)}</td></tr>
                  <tr><td>세부 업무</td><td>${formatText(item.task)}</td></tr>
                  <tr><td>업무 단계</td><td>${formatText(item.step)}</td></tr>
                  <tr><td>업무 설명</td><td>${formatText(item.work)}</td></tr>
                  <tr><td>입력 자료</td><td>${formatText(item.inputs)}</td></tr>
                  <tr><td>출력물/결과</td><td>${formatText(item.output)}</td></tr>
                  <tr><td>연관 시스템</td><td>${formatText(item.system)}</td></tr>
                </table>
              </div>

              <div class="action-row">
                <button class="btn primary" onclick="protectedOpenScreen('${partKey}_overview')">${escapeHtml(part.partName)} 전체 FLOW</button>
              </div>
            </div>

            <div class="panel">
              <h3>${escapeHtml(process.process)} 단계</h3>
              <div class="table-wrap">
                <table>
                  <tr><th>단계</th><th>표시명</th><th>업무 설명</th></tr>
                  ${relatedRows}
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function registerGeneratedScreens() {
      GENERATED_PART_ORDER.forEach((partKey) => {
        const part = PART_FLOW_DATA[partKey];
        screens[`${partKey}_overview`] = {
          tab: `${part.partName} 업무 FLOW`,
          html: () => partOverview(partKey)
        };

        part.processes.forEach((process) => {
          process.items.forEach((item) => {
            const screenKey = makeFlowScreenKey(partKey, process.pid, item.step);
            screens[screenKey] = {
              tab: `${part.partName} > ${process.process} > ${getFlowLabel(process.items, item)}`,
              html: () => partFlowScreen(partKey, process.pid, item.step)
            };
          });
        });
      });
    }

    function resizePortalFrame(frame) {
      if (!frame) return;

      const applyHeight = function() {
        try {
          const doc = frame.contentWindow.document.documentElement;
          const body = frame.contentWindow.document.body;
          const nextHeight = Math.max(
            980,
            doc ? doc.scrollHeight : 0,
            body ? body.scrollHeight : 0
          );
          frame.style.height = nextHeight + "px";
        } catch (error) {
          frame.style.height = "1120px";
        }
      };

      applyHeight();
      setTimeout(applyHeight, 300);
      setTimeout(applyHeight, 1000);
      setTimeout(applyHeight, 2500);
      setTimeout(applyHeight, 5000);
    }

    window.resizePortalFrame = resizePortalFrame;


    window.addEventListener("message", function(event) {
      const data = event.data || {};
      if (data.type !== "qr-generator-height") return;

      const frame = document.getElementById("qrGeneratorFrame");
      if (!frame) return;

      const height = Math.max(980, Number(data.height) || 0);
      frame.style.height = height + "px";
    });

    function setActiveMenu(screenKey) {
      document.querySelectorAll(".tree-link, .tree-home").forEach((el) => {
        el.classList.remove("active");
      });

      if (screenKey === "home") {
        const homeBtn = document.querySelector(".tree-home");
        if (homeBtn) homeBtn.classList.add("active");
        return;
      }

      const activeBtn = document.querySelector(`.tree-link[data-screen="${screenKey}"]`);
      if (activeBtn) activeBtn.classList.add("active");
    }

    function openScreen(key) {
      const item = screens[key];
      if (!item) return;

      screenEl.innerHTML = typeof item.html === "function" ? item.html() : item.html;
      tabTitle.textContent = item.tab;
      setActiveMenu(key);
    }

    function protectedOpenScreen(key) {
      requireLogin({ type: "screen", key: key });
    }

    function protectedGoUrl(url) {
      requireLogin({ type: "url", url: url });
    }

    window.protectedOpenScreen = protectedOpenScreen;
    window.protectedGoUrl = protectedGoUrl;
    window.openLoginModalFromHome = function() {
      pendingAction = null;
      openLoginModal();
    };

    function resetMenuToInitialState() {
      menuSearch.value = "";
      clearMenuSearchBtn.style.display = "none";
      resetMenuFilter();
    }

    function bindMenuEvents() {
      document.querySelector(".tree-home").addEventListener("click", () => {
        resetMenuToInitialState();
        openScreen("home");
      });

      document.querySelectorAll(".tree-link").forEach((link) => {
        link.addEventListener("click", () => {
          const screen = link.dataset.screen;
          const url = link.dataset.url;

          if (screen) {
            requireLogin({ type: "screen", key: screen });
            return;
          }

          if (url) {
            requireLogin({ type: "url", url: url });
          }
        });
      });
    }

    function bindModalEvents() {
      openLoginBtn.addEventListener("click", () => {
        pendingAction = null;
        openLoginModal();
      });

      logoutBtn.addEventListener("click", () => logout());

      closeLoginBtn.addEventListener("click", () => {
        pendingAction = null;
        closeLoginModal();
      });

      cancelLoginBtn.addEventListener("click", () => {
        pendingAction = null;
        closeLoginModal();
      });

      submitLoginBtn.addEventListener("click", login);

      loginModal.addEventListener("click", (event) => {
        if (event.target === loginModal) {
          pendingAction = null;
          closeLoginModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        const modalOpened = !loginModal.classList.contains("hidden");

        if (event.key === "Escape" && modalOpened) {
          pendingAction = null;
          closeLoginModal();
          return;
        }

        if (event.key === "Enter" && modalOpened) {
          const activeElement = document.activeElement;
          if (activeElement === loginNameInput || activeElement === loginEmpNoInput) {
            login();
          }
        }
      });
    }

    function normalizeMenuKeyword(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function showMenuBranch(detailsEl) {
      detailsEl.style.display = "";
      detailsEl.open = true;

      const children = Array.from(detailsEl.children);
      children.forEach((child) => {
        if (child.classList && child.classList.contains("subtree")) {
          child.style.display = "";
        }

        if (child.tagName === "DETAILS") {
          showMenuBranch(child);
        }

        if (child.classList && child.classList.contains("tree-link")) {
          child.style.display = "";
        }
      });

      const subtree = Array.from(detailsEl.children).find((child) => child.classList && child.classList.contains("subtree"));
      if (subtree) {
        Array.from(subtree.children).forEach((child) => {
          if (child.tagName === "DETAILS") {
            showMenuBranch(child);
          } else if (child.classList && child.classList.contains("tree-link")) {
            child.style.display = "";
          }
        });
      }
    }

    function filterMenuDetails(detailsEl, keyword) {
      const summary = Array.from(detailsEl.children).find((child) => child.tagName === "SUMMARY");
      const subtree = Array.from(detailsEl.children).find((child) => child.classList && child.classList.contains("subtree"));
      const selfMatch = summary ? normalizeMenuKeyword(summary.textContent).includes(keyword) : false;

      if (selfMatch) {
        detailsEl.style.display = "";
        detailsEl.open = true;
        if (subtree) subtree.style.display = "";
        if (subtree) {
          Array.from(subtree.children).forEach((child) => {
            if (child.tagName === "DETAILS") {
              showMenuBranch(child);
            } else if (child.classList && child.classList.contains("tree-link")) {
              child.style.display = "";
            }
          });
        }
        return true;
      }

      let hasVisibleChild = false;

      if (subtree) {
        Array.from(subtree.children).forEach((child) => {
          if (child.tagName === "DETAILS") {
            const visible = filterMenuDetails(child, keyword);
            if (visible) hasVisibleChild = true;
            return;
          }

          if (child.classList && child.classList.contains("tree-link")) {
            const linkMatch = normalizeMenuKeyword(child.textContent).includes(keyword);
            child.style.display = linkMatch ? "" : "none";
            if (linkMatch) hasVisibleChild = true;
          }
        });
      }

      detailsEl.style.display = hasVisibleChild ? "" : "none";
      detailsEl.open = hasVisibleChild;
      if (subtree) subtree.style.display = hasVisibleChild ? "" : "none";
      return hasVisibleChild;
    }

    function resetMenuFilter() {
      document.querySelectorAll(".tree-home, .tree-link, details, .subtree").forEach((el) => {
        el.style.display = "";
      });

      document.querySelectorAll("details").forEach((detailsEl) => {
        detailsEl.open = detailsEl.dataset.originalOpen === "true";
      });
    }

    function filterMenu() {
      const keyword = normalizeMenuKeyword(menuSearch.value);
      clearMenuSearchBtn.style.display = menuSearch.value ? "block" : "none";

      if (!keyword) {
        resetMenuFilter();
        return;
      }

      const homeBtn = document.querySelector(".tree-home");
      if (homeBtn) {
        const homeMatch = normalizeMenuKeyword(homeBtn.textContent).includes(keyword);
        homeBtn.style.display = homeMatch ? "" : "none";
      }

      document.querySelectorAll(".tree-wrap > details, #generatedPartMenus > details").forEach((detailsEl) => {
        filterMenuDetails(detailsEl, keyword);
      });
    }

    function syncLoginStateAcrossPages() {
      window.addEventListener("storage", (event) => {
        if (event.key !== LOGIN_STORAGE_KEY) return;
        loadSavedUser();
      });
    }

    function init() {
      renderGeneratedPartMenus();
      registerGeneratedScreens();
      loadSavedUser();
      bindActivityEvents();
      bindMenuEvents();
      bindModalEvents();
      syncLoginStateAcrossPages();
      startAutoLogoutWatcher();

      document.querySelectorAll("details").forEach((detailsEl) => {
        detailsEl.dataset.originalOpen = detailsEl.open ? "true" : "false";
      });

      menuSearch.addEventListener("input", filterMenu);
      clearMenuSearchBtn.addEventListener("click", () => {
        menuSearch.value = "";
        filterMenu();
        menuSearch.focus();
      });

      openScreen("home");
    }

    init();
  </script>
