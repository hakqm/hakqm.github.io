<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>검사/업무 스케쥴 관리</title>
  <style>

    :root{
      --navy:#203a69;
      --navy-dark:#172b50;
      --navy-soft:#eaf2ff;
      --blue:#2563eb;
      --green:#16a34a;
      --orange:#d97706;
      --red:#dc2626;
      --purple:#7c3aed;
      --slate:#475569;
      --bg:#eef2f7;
      --surface:#ffffff;
      --surface2:#f8fafc;
      --line:#d7e1ef;
      --line2:#e6edf6;
      --text:#172033;
      --muted:#667085;
      --shadow:0 18px 42px rgba(28,45,76,.10);
      --shadow-sm:0 8px 20px rgba(28,45,76,.07);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
    }

    *{box-sizing:border-box;}
    html,body{margin:0;min-height:100%;font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:var(--bg);color:var(--text);}
    button,input,select,textarea{font:inherit;}
    button{cursor:pointer;}
    .hidden{display:none!important;}

    .app-shell{max-width:1500px;margin:0 auto;padding:0 28px 34px;}

    .page-hero{
      margin:0 -28px 22px;
      padding:28px 30px 34px;
      border-bottom:1px solid #d6e1f0;
      background:
        radial-gradient(circle at 100% 0%, rgba(52,74,140,.16), transparent 34%),
        linear-gradient(135deg,#f8fbff 0%,#eef4fd 48%,#e7eef9 100%);
    }
    .page-hero-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;max-width:1500px;margin:0 auto;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid #cfe0ff;border-radius:999px;background:#fff;color:#173b78;font-size:12px;font-weight:900;letter-spacing:.3px;box-shadow:0 6px 14px rgba(52,74,140,.05);}
    .title-block h1{display:flex;align-items:center;gap:12px;margin:14px 0 0;font-size:32px;line-height:1.2;letter-spacing:-.04em;color:#0f2346;}
    .title-block h1 .icon{width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;background:#eaf2ff;color:#173b78;font-size:22px;}
    .title-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:16px;color:var(--muted);font-size:13px;}
    .chip{display:inline-flex;align-items:center;gap:6px;min-height:32px;padding:7px 12px;border:1px solid #cfe0ff;border-radius:999px;background:#fff;color:#334155;font-weight:800;font-size:13px;}
    .chip.primary{background:#173b78;color:#fff;border-color:#173b78;}
    .top-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center;flex-wrap:wrap;}

    .btn{border:1px solid #c9d4e4;background:#fff;color:#26364f;border-radius:14px;padding:11px 15px;font-weight:900;transition:.16s ease;box-shadow:0 4px 10px rgba(15,23,42,.03);}
    .btn:hover{background:#f8fbff;border-color:#aebfd8;transform:translateY(-1px);}
    .btn.primary{background:#203f82;border-color:#203f82;color:#fff;box-shadow:0 14px 26px rgba(32,63,130,.20);}
    .btn.primary:hover{background:#172f63;}
    .btn.danger{background:var(--red);border-color:var(--red);color:#fff;}
    .btn.small{padding:9px 12px;font-size:13px;border-radius:12px;min-width:42px;}
    .btn.ghost{background:transparent;box-shadow:none;}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}

    .kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:18px;}
    .kpi{position:relative;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 20px;box-shadow:var(--shadow-sm);}
    .kpi::after{content:"";position:absolute;right:-26px;top:-26px;width:92px;height:92px;border-radius:999px;background:#f1f5fb;}
    .kpi .label{position:relative;z-index:1;color:#5c6b82;font-size:13px;font-weight:900;margin-bottom:10px;}
    .kpi .value{position:relative;z-index:1;font-size:32px;line-height:1;font-weight:950;color:#203a69;letter-spacing:-.04em;}
    .kpi .sub{position:relative;z-index:1;margin-top:9px;font-size:12px;color:#78879b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .filter-card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
    .filter-top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 20px;border-bottom:1px solid var(--line2);background:linear-gradient(180deg,#ffffff,#f8fafc);}
    .filter-left{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
    .filter-block{display:flex;align-items:center;gap:10px;}
    .filter-block-label{color:#5f6b84;font-size:12px;font-weight:950;white-space:nowrap;}
    .filter-grid{display:grid;grid-template-columns:1fr .95fr .95fr 1.55fr auto;gap:12px;padding:16px 20px 20px;align-items:end;}
    .field{display:flex;flex-direction:column;gap:7px;min-width:0;}
    .field label{font-size:12px;color:#52627a;font-weight:950;}
    .control{width:100%;border:1px solid #cdd7e5;border-radius:14px;background:#fff;min-height:46px;padding:0 14px;color:#172033;outline:none;}
    textarea.control{min-height:92px;padding:12px 14px;resize:vertical;line-height:1.6;}
    .control:focus{border-color:#203f82;box-shadow:0 0 0 4px rgba(52,74,140,.08);}
    .time-input-wrap{position:relative;display:flex;align-items:center;}
    .time-input-wrap .control{padding-right:42px;font-variant-numeric:tabular-nums;}
    .time-pick-btn{position:absolute;right:8px;width:30px;height:30px;border:0;border-radius:10px;background:#eef4ff;color:#203f82;font-weight:950;display:inline-flex;align-items:center;justify-content:center;}
    .time-pick-btn:hover{background:#dbeafe;}
    .time-menu{position:fixed;z-index:90;width:142px;max-height:220px;overflow:auto;padding:6px;border:1px solid #cbd7ea;border-radius:14px;background:#fff;box-shadow:0 18px 42px rgba(15,23,42,.18);display:grid;gap:3px;}
    .time-menu button{border:0;background:#fff;border-radius:9px;padding:8px 10px;color:#203a69;font-size:13px;font-weight:900;text-align:left;}
    .time-menu button:hover{background:#eef4ff;}
    .seg{display:inline-flex;gap:4px;flex-wrap:wrap;padding:4px;border:1px solid #d9e3f0;border-radius:999px;background:#f3f6fb;}
    .seg button{border:0;background:transparent;color:#526176;border-radius:999px;padding:10px 15px;font-weight:950;font-size:13px;box-shadow:none;}
    .seg button:hover{background:#e9f1ff;color:#26386a;}
    .seg button.active{background:#203f82;color:#fff;box-shadow:0 7px 14px rgba(52,74,140,.20);}
    .nav-row{display:flex;gap:8px;align-items:center;justify-content:flex-end;}
    .range-title{min-width:218px;padding:10px 16px;border:1px solid #dbe3ec;border-radius:999px;background:#fff;color:#203a69;text-align:center;font-size:14px;font-weight:950;}

    .board{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;}
    .board-head{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line2);background:#fff;}
    .board-head h2{margin:0;color:#203a69;font-size:18px;letter-spacing:-.02em;}
    .board-head .status{color:#667085;font-size:13px;font-weight:950;}
    .loading{padding:42px;text-align:center;color:#64748b;font-weight:900;}

    .week-grid{display:grid;grid-template-columns:repeat(7,minmax(136px,1fr));min-width:0;background:#f8fafc;}
    .day-col{min-height:420px;border-right:1px solid #e2e8f0;background:#f8fafc;min-width:0;}
    .day-col:last-child{border-right:0;}
    .day-head{position:sticky;top:0;z-index:1;padding:13px 13px 11px;border-bottom:1px solid #e2e8f0;background:rgba(248,250,252,.96);backdrop-filter:blur(8px);}
    .day-name{color:#203a69;font-size:14px;font-weight:950;}
    .day-date{display:flex;align-items:center;gap:7px;margin-top:3px;color:#667085;font-size:12px;font-weight:900;}
    .today-pill{display:inline-flex;padding:2px 7px;border-radius:999px;background:#eaf2ff;color:#173b78;font-size:10px;font-weight:950;}
    .day-body{display:grid;align-content:start;gap:8px;padding:10px;}
    .empty-day{display:flex;align-items:center;justify-content:center;min-height:120px;border:1px dashed #cbd5e1;border-radius:14px;background:rgba(255,255,255,.58);color:#94a3b8;font-size:13px;font-weight:900;text-align:center;}

    .mobile-week-wrap{display:none;}
    .mobile-week-tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 12px 6px;background:#f8fafc;border-bottom:1px solid #e2e8f0;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
    .mobile-week-tabs::-webkit-scrollbar{height:4px;}
    .mobile-week-tabs::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}
    .mobile-day-btn{flex:0 0 auto;min-width:76px;border:1px solid #d9e3f0;border-radius:14px;background:#fff;color:#203a69;padding:8px 10px;text-align:center;font-weight:950;scroll-snap-align:start;}
    .mobile-day-btn .md-name{display:block;font-size:12px;line-height:1.2;}
    .mobile-day-btn .md-date{display:block;margin-top:3px;font-size:11px;color:#64748b;}
    .mobile-day-btn.active{background:#203f82;color:#fff;border-color:#203f82;box-shadow:0 8px 18px rgba(32,63,130,.20);}
    .mobile-day-btn.active .md-date{color:#eaf2ff;}
    .mobile-day-btn.today:not(.active){border-color:#93c5fd;background:#eff6ff;}
    .mobile-day-panel{padding:12px;background:#f8fafc;}
    .mobile-day-panel .day-col{display:block;margin:0;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;background:#fff;}


    .overview-wrap{padding:18px;background:#f8fafc;}
    .overview-title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
    .overview-title-row strong{display:block;color:#203a69;font-size:17px;font-weight:950;letter-spacing:-.02em;}
    .overview-title-row span{display:block;margin-top:4px;color:#667085;font-size:12px;font-weight:800;}
    .overview-note{display:inline-flex;align-items:center;min-height:30px;padding:6px 11px;border:1px solid #dbe6f5;border-radius:999px;background:#fff;color:#475569;font-size:12px;font-weight:900;}
    .part-summary-grid{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
    .part-summary-card{border:1px solid #dbe3ec;border-radius:16px;background:#fff;padding:13px 14px;box-shadow:0 7px 16px rgba(31,41,55,.05);}
    .part-summary-card .part{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#203a69;font-weight:950;font-size:13px;}
    .part-summary-card .num{font-size:26px;font-weight:950;color:#203f82;letter-spacing:-.04em;margin-top:8px;}
    .part-summary-card .meta{margin-top:6px;color:#667085;font-size:11px;font-weight:850;line-height:1.55;}
    .matrix-wrap{overflow:auto;border:1px solid #dbe3ec;border-radius:18px;background:#fff;box-shadow:0 8px 18px rgba(31,41,55,.05);}
    .matrix-table{min-width:1080px;border-collapse:separate;border-spacing:0;width:100%;}
    .matrix-table th{position:sticky;top:0;z-index:1;background:#f6f8fc;color:#33445f;text-align:center;font-size:12px;font-weight:950;border-bottom:1px solid #e6ebf2;}
    .matrix-table th:first-child,.matrix-table td:first-child{position:sticky;left:0;z-index:2;background:#fff;text-align:left;font-weight:950;color:#203a69;min-width:116px;}
    .matrix-table th:first-child{z-index:3;background:#f6f8fc;}
    .matrix-table td{height:74px;border-bottom:1px solid #edf1f7;border-right:1px solid #edf1f7;vertical-align:top;padding:10px;cursor:default;}
    .matrix-cell{display:grid;gap:5px;}
    .matrix-count{display:inline-flex;width:max-content;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;background:#eaf2ff;color:#173b78;font-size:12px;font-weight:950;}
    .matrix-breakdown{color:#64748b;font-size:11px;font-weight:850;line-height:1.45;}
    .matrix-empty{color:#cbd5e1;font-size:12px;font-weight:850;text-align:center;padding-top:14px;}
    .detail-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 0 10px;color:#203a69;font-size:15px;font-weight:950;}
    .compact-table th,.compact-table td{padding:11px 10px;}
    .compact-title{font-weight:950;color:#1f2937;}
    .compact-sub{margin-top:3px;color:#64748b;font-size:12px;font-weight:750;}

    .task-card{position:relative;overflow:hidden;border:1px solid #dbe3ec;border-radius:14px;background:#fff;box-shadow:0 6px 13px rgba(31,41,55,.055);padding:11px 12px 11px 15px;transition:.16s ease;min-height:0;width:100%;text-align:left;}
    .task-card:hover{transform:translateY(-1px);box-shadow:0 10px 18px rgba(31,41,55,.10);border-color:#c7d7f2;}
    .task-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:#64748b;}
    .task-card[data-category="INSPECTION"]::before{background:#2563eb;}
    .task-card[data-category="CUSTOMER"]::before{background:#16a34a;}
    .task-card[data-category="AUDIT"]::before{background:#d97706;}
    .task-card[data-category="BUSINESS_TRIP"]::before{background:#7c3aed;}
    .task-card[data-category="INTERNAL"]::before{background:#64748b;}
    .task-card[data-category="ETC"]::before{background:#475569;}
    .task-block{display:grid;gap:6px;min-width:0;}
    .task-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;min-width:0;}
    .task-primary{color:#0f172a;font-size:13px;font-weight:950;line-height:1.25;letter-spacing:-.01em;word-break:keep-all;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .task-count{display:inline-flex;align-items:center;justify-content:center;min-width:23px;height:19px;padding:0 7px;border-radius:999px;background:#eef2ff;color:#203a69;font-size:10.5px;font-weight:950;flex:0 0 auto;}
    .task-time-line{display:block;color:#203f82;font-size:11.5px;font-weight:950;line-height:1.2;}
    .task-kind{display:flex;align-items:center;gap:6px;color:#334155;font-size:11.5px;font-weight:900;line-height:1.35;min-width:0;}
    .task-kind-text{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .task-person{color:#334155;font-size:11.5px;font-weight:900;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .task-person strong{color:#203a69;font-weight:950;}
    .task-place{color:#64748b;font-size:11.5px;font-weight:850;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .task-extra{color:#94a3b8;font-size:10.5px;font-weight:800;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .badge{display:inline-flex;align-items:center;min-height:22px;padding:3px 7px;border-radius:999px;font-size:10.5px;font-weight:950;line-height:1.2;background:#f1f5f9;color:#475569;}
    .b-blue{background:#eaf2ff;color:#164886;}.b-green{background:#ecfdf3;color:#027a48;}.b-orange{background:#fff7ed;color:#b54708;}.b-purple{background:#f5f3ff;color:#6d28d9;}.b-gray{background:#f1f5f9;color:#475569;}.b-red{background:#fef3f2;color:#b42318;}.b-slate{background:#f1f5f9;color:#334155;}

    .table-wrap{overflow:auto;background:#fff;}
    table{min-width:980px;width:100%;border-collapse:separate;border-spacing:0;background:#fff;}
    th,td{border-bottom:1px solid #e6ebf2;padding:13px 11px;text-align:left;vertical-align:top;font-size:13px;line-height:1.55;}
    th{position:sticky;top:0;z-index:1;background:#f6f8fc;color:#33445f;font-size:12px;font-weight:950;}
    tbody tr{cursor:pointer;transition:.14s ease;}
    tbody tr:hover td{background:#f8fbff;}
    .year-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;padding:18px;background:#f8fafc;border-bottom:1px solid var(--line2);}
    .month-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:16px;box-shadow:var(--shadow-sm);}
    .month-card .m{font-weight:950;color:#203a69;margin-bottom:8px;}.month-card .count{font-size:30px;font-weight:950;color:#203f82;}.month-card .hint{margin-top:8px;color:#667085;font-size:12px;font-weight:800;}

    .quick-status{min-width:70px;height:26px;border:1px solid #cbd7ea;border-radius:999px;background:#ffffff;color:#203a69;font-size:11px;font-weight:950;padding:0 20px 0 8px;outline:none;cursor:pointer;}
    .quick-status:hover{border-color:#8fb0e8;background:#f8fbff;}
    .quick-status:disabled{opacity:.72;cursor:not-allowed;background:#f1f5f9;}
    .quick-status.is-pending{border-color:#f59e0b;background:#fff7ed;color:#92400e;}
    .task-kind .quick-status{min-width:58px;height:24px;border-radius:8px;font-size:11px;padding-left:5px;padding-right:18px;background:#f8fbff;}
    .board-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
    .status-save-btn{padding:9px 13px;border-radius:12px;font-size:12px;box-shadow:0 10px 18px rgba(32,63,130,.16);}
    .saving-strip{display:none;align-items:center;gap:8px;min-height:28px;padding:6px 10px;border:1px solid #bfdbfe;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:950;}
    .saving-strip.active{display:inline-flex;}
    .saving-spinner{width:13px;height:13px;border:2px solid rgba(29,78,216,.22);border-top-color:#1d4ed8;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .busy-mask{position:fixed;inset:0;z-index:120;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.28);backdrop-filter:blur(2px);}
    .busy-card{display:flex;align-items:center;gap:12px;padding:16px 20px;border-radius:18px;background:#fff;color:#203a69;font-weight:950;box-shadow:0 18px 46px rgba(15,23,42,.28);border:1px solid #dbe6f5;}
    .busy-card .saving-spinner{width:18px;height:18px;}

    .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-start;justify-content:center;background:rgba(15,23,42,.55);padding:18px 24px 48px;overflow:auto;}
    .modal-card{width:min(760px, calc(100vw - 80px));max-height:calc(100vh - 42px);overflow:hidden;background:#fff;border-radius:24px;box-shadow:0 28px 72px rgba(15,23,42,.30);border:1px solid #e5e7eb;margin-top:0;display:flex;flex-direction:column;}
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:18px 28px 14px;border-bottom:1px solid #e5e7eb;background:linear-gradient(180deg,#fff,#f8fafc);cursor:move;user-select:none;}
    .modal-head h3{margin:0;color:#203a69;font-size:20px;letter-spacing:-.02em;line-height:1.35;}.modal-close{border:0;background:#eef2f7;border-radius:999px;width:34px;height:34px;font-size:20px;color:#334155;flex:0 0 auto;cursor:pointer;}
    .modal-body{padding:20px 28px 0;overflow:auto;}
    .form-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px 18px;}.form-grid .full{grid-column:1/-1;}
    .form-grid .field,.advanced .field{display:flex;flex-direction:column;gap:7px;}
    .form-grid label,.advanced label{font-size:12px;font-weight:900;color:#40526d;}
    .modal .control{min-height:46px;border-radius:13px;}
    .modal textarea.control{min-height:78px;resize:vertical;line-height:1.55;padding-top:12px;}
    .modal-actions{position:sticky;bottom:0;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin:18px -28px 0;padding:14px 28px 16px;border-top:1px solid #e5e7eb;background:linear-gradient(180deg,rgba(255,255,255,.96),#fff);box-shadow:0 -10px 22px rgba(15,23,42,.06);}
    .left-actions,.right-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .right-actions{margin-left:auto;}
    details.advanced{margin-top:16px;border:1px solid #e1e8f2;border-radius:18px;background:#f8fafc;overflow:hidden;}
    details.advanced summary{font-weight:950;color:#203a69;cursor:pointer;padding:13px 18px;background:#f3f6fb;}
    details.advanced .inner{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px 18px;padding:18px;}
    .toast{position:fixed;right:24px;bottom:24px;z-index:80;background:#172b50;color:#fff;padding:12px 16px;border-radius:14px;font-weight:900;box-shadow:0 12px 24px rgba(15,23,42,.2);}
    .login-panel{max-width:520px;margin:80px auto;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:28px;}.login-panel h1{margin:0 0 8px;color:#203a69;}.login-panel p{color:#667085;line-height:1.7;}.login-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-top:18px;}

    @media(max-width:1280px){.week-grid{grid-template-columns:repeat(7,minmax(118px,1fr));}.task-card{padding:10px 10px 10px 14px;}.task-primary{font-size:12.5px;}.task-kind,.task-person,.task-place{font-size:11px;}.quick-status{min-width:62px;} }
    @media(max-width:1000px){.app-shell{padding:0 16px 28px;}.page-hero{margin:0 -16px 18px;padding:22px 18px 26px;}.page-hero-inner,.filter-top{align-items:stretch;flex-direction:column;}.filter-grid{grid-template-columns:1fr 1fr;}.kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.part-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.year-grid{grid-template-columns:repeat(2,minmax(0,1fr));}.title-block h1{font-size:27px;}.login-grid{grid-template-columns:1fr;}}
    @media(max-width:640px){.filter-grid,.form-grid,details.advanced .inner{grid-template-columns:1fr;}.kpi-grid,.part-summary-grid,.year-grid{grid-template-columns:1fr;}.top-actions{justify-content:flex-start;}.range-title{min-width:0;width:100%;}.nav-row{justify-content:flex-start;}.seg{width:100%;}.seg button{flex:1;}.login-panel{margin:36px 12px;}.modal{padding:12px;}.modal-card{width:100%;max-height:calc(100vh - 24px);border-radius:20px;}.modal-head{padding:16px 18px 12px;}.modal-body{padding:18px 18px 0;}.modal-actions{margin-left:-18px;margin-right:-18px;padding-left:18px;padding-right:18px;}}

    @media(max-width:720px){
      .app-shell{padding:0 10px 24px;}
      .page-hero{margin:0 -10px 14px;padding:18px 14px 22px;}
      .title-block h1{font-size:23px;}
      .filter-top{gap:12px;}
      .filter-left{gap:10px;}
      .filter-block{width:100%;align-items:flex-start;flex-direction:column;}
      .filter-grid{grid-template-columns:1fr;gap:10px;padding:12px;}
      .week-grid{display:block;min-width:0;background:#f8fafc;padding:12px;}
      .day-col{min-height:0;border:1px solid #e2e8f0;border-radius:16px;margin-bottom:12px;overflow:hidden;background:#fff;}
      .day-col:last-child{border-right:1px solid #e2e8f0;}
      .day-head{position:static;background:#f8fafc;}
      .day-body{padding:10px;gap:8px;}
      .empty-day{min-height:64px;}
      .task-card{max-width:none;width:100%;}
      .matrix-table,.compact-table,table{min-width:760px;}
      .part-summary-grid{grid-template-columns:1fr;}
      .toast{left:12px;right:12px;bottom:16px;}
    }

  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const DEFAULT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwn9I60-14GHDQk_rNF_uJYBpig-Bovl7Qqje_eGGjcFmZJZfqQgtpUg6necytvlQQ-/exec";
    const URL_PARAMS = new URLSearchParams(window.location.search);
    const PARENT_WEB_APP_URL = (() => {
      try { return window.parent && window.parent.HAK_WEB_APP_URL ? window.parent.HAK_WEB_APP_URL : ""; } catch(e) { return ""; }
    })();
    const WEB_APP_URL = URL_PARAMS.get("api") || PARENT_WEB_APP_URL || DEFAULT_WEB_APP_URL;
    const LOGIN_STORAGE_KEY = "hak_login_user";
    const LOGIN_EXPIRE_MS = 30 * 60 * 1000;
    const LAST_INPUT_KEY = "hak_schedule_last_input";
    const PARTS = ["QA", "상선/해군", "해양", "산업공조", "FAN", "FUELCELL"];
    const DEFAULT_CATEGORIES = [
      { category:"INSPECTION", display_name:"검사", color:"blue" },
      { category:"CUSTOMER", display_name:"고객검사", color:"green" },
      { category:"AUDIT", display_name:"업체감사", color:"orange" },
      { category:"BUSINESS_TRIP", display_name:"출장검사", color:"purple" },
      { category:"INTERNAL", display_name:"내부업무", color:"gray" },
      { category:"ETC", display_name:"기타", color:"slate" }
    ];

    const state = {
      user:null,
      categories:[],
      schedules:[],
      loading:false,
      scope:"mine",
      period:"week",
      cursor:new Date(),
      part:"",
      personKeyword:"",
      category:"",
      status:"",
      keyword:"",
      editSchedule:null,
      pendingStatusChanges:{},
      mobileDayDate:""
    };

    const root = document.getElementById("root");

    function pad(n){ return String(n).padStart(2,"0"); }
    function ymd(d){ return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
    function parseDate(s){ const d = new Date(String(s || "").replace(/-/g,"/")); return isNaN(d.getTime()) ? null : d; }
    function formatScheduleTime(value){
      if(value == null || value === "") return "";
      const text = String(value).trim();
      if(!text) return "";
      const exact = text.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
      if(exact) return pad(exact[1]) + ":" + exact[2];
      const insideDate = text.match(/(?:^|\s)(\d{1,2}):(\d{2})(?::\d{2})?(?:\s|$)/);
      if(insideDate) return pad(insideDate[1]) + ":" + insideDate[2];
      const parsed = new Date(text);
      if(!isNaN(parsed.getTime())) return pad(parsed.getHours()) + ":" + pad(parsed.getMinutes());
      return text.length > 8 ? "" : text;
    }
    function displayTime(s){
      const start = formatScheduleTime(s.start_time);
      const end = formatScheduleTime(s.end_time);
      if(start && end) return start + "-" + end;
      return start || end || "";
    }
    function normalizeTimeInput(value){
      let text = String(value || "").trim();
      if(!text) return "";
      let isPm = /오후|pm/i.test(text);
      text = text.replace(/오전|오후|AM|PM/gi, "").trim();
      const m = text.match(/^(\d{1,2})(?::?(\d{2}))?$/);
      if(m){
        let h = Number(m[1]);
        const min = m[2] == null ? "00" : m[2];
        if(isPm && h < 12) h += 12;
        if(!isPm && h === 24) h = 0;
        if(h >= 0 && h <= 23) return pad(h) + ":" + min;
      }
      return formatScheduleTime(text);
    }
    function createTimeOptions(){
      const options = [];
      for(let h=0; h<24; h++){
        for(const m of [0,30]) options.push(pad(h) + ":" + pad(m));
      }
      return options;
    }
    const TIME_OPTIONS = createTimeOptions();

    function openTimeMenu(input){
      closeTimeMenu();
      const rect = input.getBoundingClientRect();
      const menu = document.createElement("div");
      menu.className = "time-menu";
      const current = normalizeTimeInput(input.value);
      menu.innerHTML = TIME_OPTIONS.map(t => `<button type="button" data-time="${t}">${t}</button>`).join("");
      document.body.appendChild(menu);
      const width = Math.max(142, rect.width);
      menu.style.width = Math.min(width, 220) + "px";
      const left = Math.min(rect.left, window.innerWidth - Math.min(width, 220) - 10);
      const top = Math.min(rect.bottom + 6, window.innerHeight - 230);
      menu.style.left = Math.max(10, left) + "px";
      menu.style.top = Math.max(10, top) + "px";
      menu.querySelectorAll("button").forEach(btn => {
        if(btn.dataset.time === current) btn.style.background = "#eaf2ff";
        btn.onclick = () => { input.value = btn.dataset.time; closeTimeMenu(); input.focus(); };
      });
      setTimeout(() => {
        document.addEventListener("mousedown", handleOutsideTimeMenu, { once:false });
      }, 0);
    }

    function handleOutsideTimeMenu(ev){
      if(ev.target.closest(".time-menu") || ev.target.closest(".time-pick-btn")) return;
      closeTimeMenu();
    }

    function closeTimeMenu(){
      const old = document.querySelector(".time-menu");
      if(old) old.remove();
      document.removeEventListener("mousedown", handleOutsideTimeMenu);
    }

    function bindTimeInput(input){
      if(!input) return;
      input.addEventListener("input", () => {
        let v = input.value.replace(/[^0-9:]/g, "");
        if(/^\d{3,4}$/.test(v)) v = v.slice(0, v.length-2) + ":" + v.slice(-2);
        input.value = v.slice(0,5);
      });
      input.addEventListener("blur", () => { input.value = normalizeTimeInput(input.value); });
    }

    function normalizeSchedule(s){
      return Object.assign({}, s, {
        start_time: formatScheduleTime(s.start_time),
        end_time: formatScheduleTime(s.end_time)
      });
    }
    function cloneDate(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function escapeHtml(v){ return String(v == null ? "" : v).replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c])); }
    function weekdayName(d){ return ["일","월","화","수","목","금","토"][d.getDay()]; }
    function mondayOf(d){ const x=cloneDate(d); const day=x.getDay(); const diff=day===0 ? -6 : 1-day; x.setDate(x.getDate()+diff); return x; }
    function lastDayOfMonth(year, month){ return new Date(year, month+1, 0); }
    function isAdmin(){ return state.user && String(state.user.role || "").toLowerCase() === "admin"; }

    function getPeriodRange(){
      const d = cloneDate(state.cursor);
      if(state.period === "year") return { from:new Date(d.getFullYear(),0,1), to:new Date(d.getFullYear(),11,31) };
      if(state.period === "month") return { from:new Date(d.getFullYear(),d.getMonth(),1), to:lastDayOfMonth(d.getFullYear(),d.getMonth()) };
      const from = mondayOf(d); const to = cloneDate(from); to.setDate(to.getDate()+6); return { from, to };
    }

    function getRangeTitle(){
      const r = getPeriodRange();
      if(state.period === "year") return `${state.cursor.getFullYear()}년`;
      if(state.period === "month") return `${state.cursor.getFullYear()}년 ${pad(state.cursor.getMonth()+1)}월`;
      return `${ymd(r.from)} ~ ${ymd(r.to)}`;
    }

    function currentScopeLabel(){
      return state.personKeyword ? `${state.personKeyword} 담당 일정` : (state.scope === "mine" ? "내 일정" : state.scope === "part" ? `${state.part || state.user.part || "내 파트"} 파트 일정` : "전체 팀 일정");
    }

    function updatePeriodUiNow(){
      const range = getRangeTitle();
      document.querySelectorAll(".range-title").forEach(el => { el.textContent = range; });
      const boardTitle = document.getElementById("boardTitle");
      if(boardTitle) boardTitle.textContent = `${currentScopeLabel()} · ${range}`;
    }

    function isMobileView(){
      return window.matchMedia && window.matchMedia("(max-width:720px)").matches;
    }

    function jsonp(action, params={}){
      return new Promise((resolve,reject)=>{
        const cb = "hakScheduleCb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        const query = new URLSearchParams({ action, callback:cb });
        Object.keys(params).forEach(k => {
          if(params[k] !== undefined && params[k] !== null && params[k] !== "") query.append(k, params[k]);
        });
        const script = document.createElement("script");
        const timer = setTimeout(() => {
          cleanup(); reject(new Error("요청 시간이 초과되었습니다."));
        }, 12000);
        function cleanup(){ clearTimeout(timer); delete window[cb]; script.remove(); }
        window[cb] = (data) => { cleanup(); resolve(data); };
        script.onerror = () => { cleanup(); reject(new Error("서버 연결에 실패했습니다.")); };
        script.src = WEB_APP_URL + "?" + query.toString();
        document.body.appendChild(script);
      });
    }

    function isUnsupportedScheduleApi(res){
      return res && res.success === false && /잘못된 요청/.test(String(res.message || ""));
    }

    function scheduleApiErrorMessage(){
      return "스케쥴 API가 연결되지 않았습니다. 현재 연결된 Apps Script 웹 앱이 스케쥴 기능이 없는 구버전으로 응답하고 있습니다. index.html의 WEB_APP_URL을 최신 배포 URL로 맞추고, 기존 웹 앱을 새 버전으로 배포했는지 확인해주세요.";
    }

    async function refreshUserFromServerIfNeeded(){
      if(!state.user || !state.user.name || !state.user.emp_no) return;
      if(state.user.part && state.user.position && state.user.user_id) return;
      try{
        const res = await jsonp("login", { name: state.user.name, emp_no: state.user.emp_no });
        if(res && res.success && res.user){
          saveUser(res.user);
        }
      }catch(e){}
    }

    function loadSavedUser(){
      const saved = localStorage.getItem(LOGIN_STORAGE_KEY);
      if(!saved) return null;
      try{
        const parsed = JSON.parse(saved);
        if(!parsed.user || !parsed.lastActivity) return null;
        if(Date.now() - parsed.lastActivity > LOGIN_EXPIRE_MS){ localStorage.removeItem(LOGIN_STORAGE_KEY); return null; }
        parsed.lastActivity = Date.now();
        localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify(parsed));
        return parsed.user;
      }catch(e){ localStorage.removeItem(LOGIN_STORAGE_KEY); return null; }
    }

    function saveUser(user){
      state.user = user;
      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify({ user, lastActivity:Date.now() }));
    }

    function userParams(){
      return {
        user_id: state.user.user_id,
        user_name: state.user.name,
        emp_no: state.user.emp_no
      };
    }

    function categoryName(code){
      const item = (state.categories.length ? state.categories : DEFAULT_CATEGORIES).find(c => c.category === code);
      return item ? item.display_name : code || "기타";
    }

    function categoryBadgeClass(code){
      if(code === "INSPECTION") return "b-inspection";
      if(code === "CUSTOMER") return "b-customer";
      if(code === "AUDIT") return "b-audit";
      if(code === "BUSINESS_TRIP") return "b-trip";
      if(code === "INTERNAL") return "b-internal";
      return "b-etc";
    }

    function statusBadgeClass(status){
      if(status === "완료") return "b-done";
      if(status === "취소") return "b-cancel";
      return "b-status";
    }

    const STATUS_OPTIONS = ["예정","확정","진행","완료","취소","보류"];

    function effectiveStatus(s){
      if(!s) return "예정";
      return state.pendingStatusChanges[s.schedule_id] || s.status || "예정";
    }

    function normalizeTextForCompare(value){
      return String(value || "").toLowerCase().replace(/[\s\-_/·.]/g, "");
    }

    function buildExtraInfo(s){
      const titleKey = normalizeTextForCompare(s.title);
      const primaryKey = normalizeTextForCompare(primaryScheduleTitle(s));
      const extras = [];
      [s.item_code, s.qty].forEach(v => {
        const text = String(v || "").trim();
        const key = normalizeTextForCompare(text);
        if(text && key && titleKey.indexOf(key) === -1 && primaryKey.indexOf(key) === -1) extras.push(text);
      });
      return extras.join(" · ");
    }

    function normalizeProjectLabel(value){
      const text = String(value || "").trim();
      if(!text) return "";
      const m = text.match(/[A-Za-z]{2,6}[-/ ]?\d{2,6}/);
      if(m) return m[0].replace(/[ /]+/g,"-").toUpperCase();
      return text.replace(/\s+/g," ");
    }

    function primaryScheduleTitle(s){
      const project = normalizeProjectLabel(s.project_no);
      if(project) return project;
      const title = String(s.title || "").trim();
      const fromTitle = normalizeProjectLabel(title);
      if(fromTitle) return fromTitle;
      return title;
    }

    function scheduleGroupKey(s){
      return [
        s.date,
        formatScheduleTime(s.start_time),
        formatScheduleTime(s.end_time),
        s.category,
        normalizeTextForCompare(primaryScheduleTitle(s)),
        normalizeTextForCompare(s.item_code),
        normalizeTextForCompare(s.qty),
        normalizeTextForCompare(s.customer),
        normalizeTextForCompare(s.location),
        normalizeTextForCompare(s.main_user_id),
        effectiveStatus(s)
      ].map(v => String(v || "").trim()).join("|");
    }

    function groupSchedulesForDisplay(list){
      const map = new Map();
      list.forEach(item => {
        const key = scheduleGroupKey(item);
        if(!map.has(key)){
          map.set(key, Object.assign({}, item, { schedule_ids:[item.schedule_id], group_count:1 }));
        }else{
          const group = map.get(key);
          group.schedule_ids.push(item.schedule_id);
          group.group_count += 1;
        }
      });
      return Array.from(map.values());
    }

    function canEditSchedule(s){
      return !s || isAdmin() || s.main_user_id === state.user.user_id || s.created_by_user_id === state.user.user_id;
    }

    function statusControlHtml(s){
      const current = effectiveStatus(s);
      if(!canEditSchedule(s)){
        return `<span class="badge ${statusBadgeClass(current)}">${escapeHtml(current)}</span>`;
      }
      const ids = (s.schedule_ids || [s.schedule_id]).filter(Boolean);
      const isPending = ids.some(id => state.pendingStatusChanges[id] !== undefined);
      return `<select class="quick-status ${isPending ? "is-pending" : ""}" data-ids="${escapeHtml(ids.join("|"))}" title="상태 변경 후 저장 버튼으로 일괄 반영">${STATUS_OPTIONS.map(v=>`<option value="${v}" ${current===v?"selected":""}>${v}</option>`).join("")}</select>`;
    }

    function toast(msg){
      const old = document.querySelector(".toast"); if(old) old.remove();
      const el = document.createElement("div"); el.className="toast"; el.textContent=msg;
      document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
    }

    function setInlineSaving(message){
      const el = document.getElementById("inlineSaving");
      if(!el) return;
      const text = el.querySelector("span:last-child");
      if(message){
        if(text) text.textContent = message;
        el.classList.add("active");
      }else{
        el.classList.remove("active");
        if(text) text.textContent = "처리 중...";
      }
    }

    function showBusy(message){
      hideBusy();
      const el = document.createElement("div");
      el.className = "busy-mask";
      el.id = "globalBusyMask";
      el.innerHTML = `<div class="busy-card"><span class="saving-spinner"></span><span>${escapeHtml(message || "처리 중...")}</span></div>`;
      document.body.appendChild(el);
    }

    function hideBusy(){
      const el = document.getElementById("globalBusyMask");
      if(el) el.remove();
    }

    function renderLogin(){
      root.innerHTML = `
        <div class="login-panel">
          <h1>스케쥴 관리 로그인</h1>
          <p>HAK QM 포털과 동일한 이름/사번으로 로그인합니다. 이미 포털에서 로그인했다면 새로고침 후 자동 연동됩니다.</p>
          <div class="login-grid">
            <input id="loginName" class="control" placeholder="이름" />
            <input id="loginEmpNo" class="control" placeholder="사번" />
            <button id="loginBtn" class="btn primary">로그인</button>
          </div>
        </div>`;
      document.getElementById("loginBtn").addEventListener("click", doLogin);
      document.getElementById("loginEmpNo").addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });
    }

    async function doLogin(){
      const name = document.getElementById("loginName").value.trim();
      const emp_no = document.getElementById("loginEmpNo").value.trim();
      if(!name || !emp_no){ toast("이름과 사번을 입력해주세요."); return; }
      const btn = document.getElementById("loginBtn"); btn.disabled = true; btn.textContent = "로그인 중...";
      try{
        const res = await jsonp("login", { name, emp_no });
        if(!res.success) throw new Error(res.message || "로그인 실패");
        saveUser(res.user);
        await initApp();
      }catch(err){ toast(err.message); }
      finally{ btn.disabled = false; btn.textContent = "로그인"; }
    }

    function renderShell(){
      const partOptions = PARTS.map(p => `<option value="${escapeHtml(p)}" ${state.part===p?"selected":""}>${escapeHtml(p)}</option>`).join("");
      const categoryOptions = (state.categories.length ? state.categories : DEFAULT_CATEGORIES).map(c => `<option value="${escapeHtml(c.category)}" ${state.category===c.category?"selected":""}>${escapeHtml(c.display_name)}</option>`).join("");
      root.innerHTML = `
        <div class="app-shell">
          <section class="page-hero">
            <div class="page-hero-inner">
              <div class="title-block">
                <div class="hero-badge">COMMON WORKSPACE · TEAM SCHEDULE</div>
                <h1><span class="icon">📅</span><span>검사/업무 스케쥴 관리</span></h1>
                <div class="title-meta">
                  <span class="chip primary">${escapeHtml(state.user.name)}님</span>
                  <span class="chip">${escapeHtml(state.user.part || "파트 미지정")}</span>
                  <span class="chip">권한 ${escapeHtml(state.user.role || "user")}</span>
                </div>
              </div>
              <div class="top-actions">
                <button id="reloadBtn" class="btn">새로고침</button>
                <button id="newBtn" class="btn primary">+ 빠른 등록</button>
              </div>
            </div>
          </section>

          <div class="kpi-grid" id="kpiGrid"></div>

          <div class="filter-card">
            <div class="filter-top">
              <div class="filter-left">
                <div class="filter-block">
                  <span class="filter-block-label">보기</span>
                  <div class="seg" id="scopeSeg">
                    <button data-scope="mine" class="${state.scope==="mine"?"active":""}">내 일정</button>
                    <button data-scope="part" class="${state.scope==="part"?"active":""}">파트별</button>
                    <button data-scope="team" class="${state.scope==="team"?"active":""}">전체 팀</button>
                  </div>
                </div>
                <div class="filter-block">
                  <span class="filter-block-label">기간</span>
                  <div class="seg" id="periodSeg">
                    <button data-period="week" class="${state.period==="week"?"active":""}">주별</button>
                    <button data-period="month" class="${state.period==="month"?"active":""}">월별</button>
                    <button data-period="year" class="${state.period==="year"?"active":""}">년도별</button>
                  </div>
                </div>
              </div>
              <div class="nav-row">
                <button id="prevBtn" class="btn small">‹</button>
                <div class="range-title">${escapeHtml(getRangeTitle())}</div>
                <button id="nextBtn" class="btn small">›</button>
                <button id="todayBtn" class="btn small">오늘</button>
              </div>
            </div>
            <div class="filter-grid">
              <div class="field ${state.scope==="part" ? "" : "hidden"}" id="partField">
                <label>파트</label>
                <select id="partFilter" class="control"><option value="">내 파트</option>${partOptions}</select>
              </div>
              <div class="field">
                <label>담당자명</label>
                <input id="personFilter" class="control" value="${escapeHtml(state.personKeyword)}" placeholder="이름 입력 시 해당자만 표시" />
              </div>
              <div class="field">
                <label>구분</label>
                <select id="categoryFilter" class="control"><option value="">전체</option>${categoryOptions}</select>
              </div>
              <div class="field">
                <label>상태</label>
                <select id="statusFilter" class="control">
                  <option value="" ${state.status===""?"selected":""}>전체</option>
                  ${["예정","확정","진행","완료","취소","보류"].map(s=>`<option value="${s}" ${state.status===s?"selected":""}>${s}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>상세 검색</label>
                <input id="keywordFilter" class="control" value="${escapeHtml(state.keyword || "")}" placeholder="호선, 품명, 장소, 메모 검색" />
              </div>
              <div class="field">
                <label>&nbsp;</label>
                <button id="queryBtn" class="btn primary">조회</button>
              </div>
            </div>
          </div>

          <div class="board">
            <div class="board-head">
              <h2 id="boardTitle">${escapeHtml(getRangeTitle())}</h2>
              <div class="board-actions">
                <div class="saving-strip" id="inlineSaving"><span class="saving-spinner"></span><span>처리 중...</span></div>
                <button id="saveStatusChangesBtn" class="btn primary status-save-btn hidden" type="button">상태 변경 저장</button>
                <div class="status" id="boardStatus">불러오는 중...</div>
              </div>
            </div>
            <div id="scheduleView" class="loading">스케쥴을 불러오는 중입니다.</div>
          </div>
        </div>`;

      bindShellEvents();
    }

    function bindShellEvents(){
      document.getElementById("reloadBtn").onclick = loadSchedules;
      document.getElementById("newBtn").onclick = () => openForm(null);
      const saveStatusBtn = document.getElementById("saveStatusChangesBtn"); if(saveStatusBtn) saveStatusBtn.onclick = savePendingStatusChanges;
      document.getElementById("prevBtn").onclick = () => movePeriod(-1);
      document.getElementById("nextBtn").onclick = () => movePeriod(1);
      document.getElementById("todayBtn").onclick = () => { state.cursor = new Date(); state.mobileDayDate = ymd(state.cursor); updatePeriodUiNow(); loadSchedules(); };
      document.querySelectorAll("#scopeSeg button").forEach(btn => btn.onclick = () => { state.scope = btn.dataset.scope; if(state.scope!=="part") state.part=""; loadSchedules(true); });
      document.querySelectorAll("#periodSeg button").forEach(btn => btn.onclick = () => { state.period = btn.dataset.period; state.mobileDayDate = ""; loadSchedules(true); });
      const partFilter = document.getElementById("partFilter"); if(partFilter) partFilter.onchange = () => { state.part = partFilter.value; loadSchedules(); };
      const categoryFilter = document.getElementById("categoryFilter"); categoryFilter.onchange = () => { state.category = categoryFilter.value; loadSchedules(); };
      const statusFilter = document.getElementById("statusFilter"); statusFilter.onchange = () => { state.status = statusFilter.value; loadSchedules(); };
      const queryBtn = document.getElementById("queryBtn"); if(queryBtn) queryBtn.onclick = () => loadSchedules();
      const keywordFilter = document.getElementById("keywordFilter");
      if(keywordFilter){
        let kt = null;
        keywordFilter.addEventListener("input", () => { clearTimeout(kt); kt = setTimeout(() => { state.keyword = keywordFilter.value.trim(); loadSchedules(); }, 400); });
      }
      const personFilter = document.getElementById("personFilter");
      let timer = null;
      personFilter.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(() => { state.personKeyword = personFilter.value.trim(); loadSchedules(); }, 350);
      });
    }

    function movePeriod(delta){
      const d = cloneDate(state.cursor);
      if(state.period === "year") d.setFullYear(d.getFullYear()+delta);
      else if(state.period === "month") d.setMonth(d.getMonth()+delta);
      else d.setDate(d.getDate() + delta*7);
      state.cursor = d;
      state.mobileDayDate = "";
      updatePeriodUiNow();
      loadSchedules();
    }

    async function loadCategories(){
      try{
        const res = await jsonp("getScheduleCategories", userParams());
        if(isUnsupportedScheduleApi(res)) throw new Error(scheduleApiErrorMessage());
        state.categories = res.success && Array.isArray(res.categories) ? res.categories : DEFAULT_CATEGORIES;
      }catch(e){ state.categories = DEFAULT_CATEGORIES; }
    }

    async function loadSchedules(repaintShell=false){
      if(repaintShell) renderShell();
      const statusEl = document.getElementById("boardStatus");
      const viewEl = document.getElementById("scheduleView");
      const titleEl = document.getElementById("boardTitle");
      if(statusEl) statusEl.textContent = "불러오는 중...";
      if(titleEl) titleEl.textContent = `${currentScopeLabel()} · ${getRangeTitle()}`;
      updatePeriodUiNow();
      if(viewEl) viewEl.innerHTML = `<div class="loading">스케쥴을 불러오는 중입니다.</div>`;
      const r = getPeriodRange();
      const params = Object.assign({}, userParams(), { from_date:ymd(r.from), to_date:ymd(r.to) });
      if(state.scope === "mine" && !state.personKeyword) params.main_user_id = state.user.user_id;
      if(state.scope === "part") params.part = state.part || state.user.part;
      if(state.category) params.category = state.category;
      if(state.status) params.status = state.status;
      if(state.keyword) params.keyword = state.keyword;
      try{
        const res = await jsonp("getSchedules", params);
        if(isUnsupportedScheduleApi(res)) throw new Error(scheduleApiErrorMessage());
        if(!res.success) throw new Error(res.message || "스케쥴을 불러오지 못했습니다.");
        let list = Array.isArray(res.schedules) ? res.schedules.map(normalizeSchedule) : [];
        if(state.personKeyword){
          const key = state.personKeyword.toLowerCase();
          list = list.filter(s => String(s.main_user_name || "").toLowerCase().includes(key));
        }
        if(state.scope === "part" && !state.part && state.user.part) {
          list = list.filter(s => s.part === state.user.part);
        }
        state.schedules = list;
        renderKpis();
        renderSchedules();
      }catch(err){
        if(statusEl) statusEl.textContent = "오류";
        if(viewEl) viewEl.innerHTML = `<div class="loading">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderKpis(){
      const total = state.schedules.length;
      const pending = state.schedules.filter(s => ["예정","확정","진행"].includes(s.status)).length;
      const done = state.schedules.filter(s => s.status === "완료").length;
      const cancel = state.schedules.filter(s => s.status === "취소").length;
      const people = new Set(state.schedules.map(s => s.main_user_name).filter(Boolean)).size;
      document.getElementById("kpiGrid").innerHTML = `
        <div class="kpi"><div class="label">전체 일정</div><div class="value">${total}</div><div class="sub">${escapeHtml(getRangeTitle())}</div></div>
        <div class="kpi"><div class="label">진행 예정</div><div class="value">${pending}</div><div class="sub">예정/확정/진행</div></div>
        <div class="kpi"><div class="label">완료</div><div class="value">${done}</div><div class="sub">완료 처리</div></div>
        <div class="kpi"><div class="label">취소</div><div class="value">${cancel}</div><div class="sub">취소 일정</div></div>
        <div class="kpi"><div class="label">담당자</div><div class="value">${people}</div><div class="sub">검색 결과 기준</div></div>`;
    }

    function renderSchedules(){
      const status = document.getElementById("boardStatus");
      status.textContent = `${state.schedules.length}건`;
      const title = document.getElementById("boardTitle");
      if(title){
        title.textContent = `${currentScopeLabel()} · ${getRangeTitle()}`;
      }
      if(state.period === "week") renderWeek();
      else if(state.period === "month") renderMonth();
      else renderYear();
      updatePendingStatusUi();
    }

    function sortedSchedules(){
      return [...state.schedules].sort((a,b)=>`${a.date} ${a.start_time||"99:99"}`.localeCompare(`${b.date} ${b.start_time||"99:99"}`));
    }

    function cardHtml(s){
      const time = displayTime(s);
      const sub = buildExtraInfo(s);
      const place = String(s.location || "").trim();
      const title = primaryScheduleTitle(s);
      return `<div class="task-card" data-category="${escapeHtml(s.category)}" data-id="${escapeHtml(s.schedule_id)}" title="${escapeHtml(s.title || title)}">
        <div class="task-block">
          <div class="task-title-row"><div class="task-primary">${escapeHtml(title || "일정")}</div>${s.group_count > 1 ? `<span class="task-count">×${s.group_count}</span>` : ""}</div>
          ${time ? `<div class="task-time-line">${escapeHtml(time)}</div>` : ""}
          <div class="task-kind"><span class="task-kind-text"><span>${escapeHtml(categoryName(s.category))}</span><span>/</span></span>${statusControlHtml(s)}</div>
          <div class="task-person"><strong>${escapeHtml(s.main_user_name || "-")}</strong> · ${escapeHtml(s.part || "-")}</div>
          ${place ? `<div class="task-place">${escapeHtml(place)}</div>` : ""}
          ${sub ? `<div class="task-extra">${escapeHtml(sub)}</div>` : ""}
        </div>
      </div>`;
    }

    function compactScheduleInfo(s){
      return buildExtraInfo(s);
    }

    function partSortValue(part){
      const order = ["QA", "상선/해군", "해양", "산업공조", "FAN", "FUELCELL", "팀장", "미지정"];
      const idx = order.indexOf(part || "미지정");
      return idx === -1 ? 999 : idx;
    }

    function getVisibleParts(){
      const parts = Array.from(new Set(state.schedules.map(s => s.part || "미지정"))).filter(Boolean);
      return parts.sort((a,b) => partSortValue(a) - partSortValue(b) || a.localeCompare(b));
    }

    function countByCategory(list){
      const counts = {};
      list.forEach(s => { const name = categoryName(s.category); counts[name] = (counts[name] || 0) + 1; });
      return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `${k} ${v}`).join(" · ");
    }

    function scheduleListTableHtml(rows){
      return `<div class="table-wrap"><table class="compact-table">
        <thead><tr><th>일자</th><th>시간</th><th>구분</th><th>스케쥴</th><th>담당</th><th>파트</th><th>상태</th><th>장소/고객</th></tr></thead>
        <tbody>${rows.length ? rows.map(s => {
          const sub = compactScheduleInfo(s);
          return `<tr class="task-row" data-id="${escapeHtml(s.schedule_id)}"><td>${escapeHtml(s.date)}</td><td>${escapeHtml(displayTime(s) || "-")}</td><td><span class="badge ${categoryBadgeClass(s.category)}">${escapeHtml(categoryName(s.category))}</span></td><td><div class="compact-title">${escapeHtml(primaryScheduleTitle(s))}</div>${sub ? `<div class="compact-sub">${escapeHtml(sub)}</div>` : ""}</td><td>${escapeHtml(s.main_user_name || "-")}</td><td>${escapeHtml(s.part || "-")}</td><td>${statusControlHtml(s)}</td><td>${escapeHtml([s.location,s.customer].filter(Boolean).join(" / ") || "-")}</td></tr>`;
        }).join("") : `<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:34px;">등록된 일정이 없습니다.</td></tr>`}</tbody>
      </table></div>`;
    }

    function bindTaskInteractions(){
      document.querySelectorAll(".task-card").forEach(el => {
        el.addEventListener("click", (ev) => {
          if(ev.target.closest(".quick-status")) return;
          const item = state.schedules.find(s => s.schedule_id === el.dataset.id);
          if(item) openForm(item);
        });
      });
      document.querySelectorAll(".task-row").forEach(el => {
        el.addEventListener("click", (ev) => {
          if(ev.target.closest(".quick-status")) return;
          const item = state.schedules.find(s => s.schedule_id === el.dataset.id);
          if(item) openForm(item);
        });
      });
      document.querySelectorAll(".quick-status").forEach(el => {
        el.addEventListener("click", ev => ev.stopPropagation());
        el.addEventListener("change", ev => {
          ev.stopPropagation();
          queueStatusChange(el.dataset.ids || el.dataset.id, el.value, el);
        });
      });
    }

    function renderWeek(){
      if(state.scope !== "mine" || state.personKeyword){ renderWeekOverview(); return; }
      const r = getPeriodRange();
      const days = [];
      for(let i=0;i<7;i++){ const d=cloneDate(r.from); d.setDate(d.getDate()+i); days.push(d); }
      if(isMobileView()){ renderMobileWeek(days); return; }
      const today = ymd(new Date());
      document.getElementById("scheduleView").innerHTML = `<div class="week-grid">${days.map(d => {
        const date = ymd(d);
        const list = groupSchedulesForDisplay(sortedSchedules().filter(s => s.date === date));
        return `<div class="day-col">
          <div class="day-head"><div class="day-name">${weekdayName(d)}요일</div><div class="day-date"><span class="num">${pad(d.getMonth()+1)}.${pad(d.getDate())}</span>${date===today?`<span class="today-pill">TODAY</span>`:""}</div></div>
          <div class="day-body">${list.length ? list.map(cardHtml).join("") : `<div class="empty-day">등록된 일정 없음</div>`}</div>
        </div>`;
      }).join("")}</div>`;
      bindTaskInteractions();
    }

    function renderMobileWeek(days){
      const today = ymd(new Date());
      const dayKeys = days.map(ymd);
      if(!state.mobileDayDate || !dayKeys.includes(state.mobileDayDate)){
        state.mobileDayDate = dayKeys.includes(today) ? today : dayKeys[0];
      }
      const activeDate = state.mobileDayDate;
      const activeDay = days[dayKeys.indexOf(activeDate)] || days[0];
      const list = groupSchedulesForDisplay(sortedSchedules().filter(s => s.date === activeDate));
      document.getElementById("scheduleView").innerHTML = `<div class="mobile-week-wrap" style="display:block;">
        <div class="mobile-week-tabs" aria-label="요일 선택">
          ${days.map(d => {
            const key = ymd(d);
            return `<button type="button" class="mobile-day-btn ${key===activeDate?"active":""} ${key===today?"today":""}" data-date="${key}">
              <span class="md-name">${weekdayName(d)}</span><span class="md-date">${pad(d.getMonth()+1)}.${pad(d.getDate())}</span>
            </button>`;
          }).join("")}
        </div>
        <div class="mobile-day-panel">
          <div class="day-col">
            <div class="day-head"><div class="day-name">${weekdayName(activeDay)}요일</div><div class="day-date"><span class="num">${pad(activeDay.getMonth()+1)}.${pad(activeDay.getDate())}</span>${activeDate===today?`<span class="today-pill">TODAY</span>`:""}</div></div>
            <div class="day-body">${list.length ? list.map(cardHtml).join("") : `<div class="empty-day">등록된 일정 없음</div>`}</div>
          </div>
        </div>
      </div>`;
      document.querySelectorAll(".mobile-day-btn").forEach(btn => {
        btn.onclick = () => { state.mobileDayDate = btn.dataset.date; renderMobileWeek(days); };
      });
      bindTaskInteractions();
    }

    function renderWeekOverview(){
      const r = getPeriodRange();
      const days = [];
      for(let i=0;i<7;i++){ const d=cloneDate(r.from); d.setDate(d.getDate()+i); days.push(d); }
      const rows = sortedSchedules();
      const parts = getVisibleParts();
      const today = ymd(new Date());
      const summaryCards = parts.length ? parts.map(part => {
        const list = rows.filter(s => (s.part || "미지정") === part);
        const people = new Set(list.map(s => s.main_user_name).filter(Boolean)).size;
        const active = list.filter(s => ["예정","확정","진행"].includes(s.status || "예정")).length;
        return `<div class="part-summary-card"><div class="part"><span>${escapeHtml(part)}</span><span class="badge b-blue">${people}명</span></div><div class="num">${list.length}</div><div class="meta">진행예정 ${active}건<br>${escapeHtml(countByCategory(list) || "일정 없음")}</div></div>`;
      }).join("") : `<div class="part-summary-card"><div class="part">일정 없음</div><div class="num">0</div><div class="meta">조회 조건에 해당하는 일정이 없습니다.</div></div>`;
      const matrix = `<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>파트</th>${days.map(d=>`<th>${weekdayName(d)}<br><span style="color:#64748b;font-weight:850;">${pad(d.getMonth()+1)}.${pad(d.getDate())}${ymd(d)===today?" · TODAY":""}</span></th>`).join("")}</tr></thead><tbody>${parts.length ? parts.map(part => `<tr><td>${escapeHtml(part)}</td>${days.map(d => {
        const date = ymd(d);
        const list = rows.filter(s => (s.part || "미지정") === part && s.date === date);
        if(!list.length) return `<td><div class="matrix-empty">-</div></td>`;
        const breakdown = countByCategory(list);
        const people = Array.from(new Set(list.map(s=>s.main_user_name).filter(Boolean))).slice(0,3).join(", ");
        return `<td><div class="matrix-cell"><span class="matrix-count">${list.length}건</span><div class="matrix-breakdown">${escapeHtml(breakdown)}</div>${people ? `<div class="matrix-breakdown">${escapeHtml(people)}${new Set(list.map(s=>s.main_user_name).filter(Boolean)).size>3?" 외":""}</div>` : ""}</div></td>`;
      }).join("")}</tr>`).join("") : `<tr><td colspan="8"><div class="matrix-empty">등록된 일정이 없습니다.</div></td></tr>`}</tbody></table></div>`;
      document.getElementById("scheduleView").innerHTML = `<div class="overview-wrap">
        <div class="overview-title-row"><div><strong>파트별 주간 현황</strong><span>많은 인원이 입력해도 일정 카드를 전부 펼치지 않고 파트·요일 기준으로 먼저 확인합니다.</span></div><div class="overview-note">상세 일정은 아래 목록에서 확인</div></div>
        <div class="part-summary-grid">${summaryCards}</div>
        ${matrix}
        <div class="detail-title"><span>상세 일정 목록</span><span>${rows.length}건</span></div>
        ${scheduleListTableHtml(rows)}
      </div>`;
      bindTaskInteractions();
    }

    function renderMonth(){
      const rows = sortedSchedules();
      document.getElementById("scheduleView").innerHTML = scheduleListTableHtml(rows);
      bindTaskInteractions();
    }

    function renderYear(){
      const months = Array.from({length:12},(_,i)=>i+1);
      document.getElementById("scheduleView").innerHTML = `<div class="year-grid">${months.map(m => {
        const list = state.schedules.filter(s => Number(String(s.date).slice(5,7)) === m);
        const people = new Set(list.map(s=>s.main_user_name).filter(Boolean)).size;
        return `<div class="month-card"><div class="m">${m}월</div><div class="count">${list.length}</div><div class="hint">담당자 ${people}명 · 완료 ${list.filter(s=>s.status==="완료").length}건</div></div>`;
      }).join("")}</div>
      <div class="table-wrap"><table>
        <thead><tr><th>일자</th><th>구분</th><th>스케쥴</th><th>담당</th><th>파트</th><th>상태</th></tr></thead>
        <tbody>${sortedSchedules().map(s=>`<tr class="task-row" data-id="${escapeHtml(s.schedule_id)}"><td>${escapeHtml(s.date)}</td><td>${escapeHtml(categoryName(s.category))}</td><td><strong>${escapeHtml(s.title)}</strong></td><td>${escapeHtml(s.main_user_name)}</td><td>${escapeHtml(s.part)}</td><td>${statusControlHtml(s)}</td></tr>`).join("") || `<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:34px;">등록된 일정이 없습니다.</td></tr>`}</tbody>
      </table></div>`;
      bindTaskInteractions();
    }

    function scheduleToFormData(s){
      return {
        schedule_id:s.schedule_id || "", date:s.date || ymd(new Date()), category:s.category || "INSPECTION", title:s.title || "",
        start_time:formatScheduleTime(s.start_time), end_time:formatScheduleTime(s.end_time), location:s.location || "", customer:s.customer || "",
        memo:s.memo || "", project_no:s.project_no || "", item_code:s.item_code || "", qty:s.qty || "", sub_user_names:s.sub_user_names || "",
        status:s.status || "예정", priority:s.priority || "일반", visibility:s.visibility || "팀", part:s.part || state.user.part || "",
        main_user_id:s.main_user_id || state.user.user_id, main_user_name:s.main_user_name || state.user.name
      };
    }

    function openForm(schedule){
      state.editSchedule = schedule;
      const data = schedule ? scheduleToFormData(schedule) : scheduleToFormData({ date:ymd(state.cursor), category:"INSPECTION", start_time:"09:00" });
      const canEdit = canEditSchedule(schedule);
      const cats = (state.categories.length ? state.categories : DEFAULT_CATEGORIES).map(c => `<option value="${escapeHtml(c.category)}" ${data.category===c.category?"selected":""}>${escapeHtml(c.display_name)}</option>`).join("");
      const partOpts = PARTS.map(p => `<option value="${escapeHtml(p)}" ${data.part===p?"selected":""}>${escapeHtml(p)}</option>`).join("");
      const modal = document.createElement("div");
      modal.className = "modal";
      modal.innerHTML = `<div class="modal-card">
        <div class="modal-head"><h3>${schedule ? "스케쥴 상세/수정" : "스케쥴 등록"}</h3><button class="modal-close" type="button">×</button></div>
        <div class="modal-body">
          ${!canEdit ? `<div class="chip" style="margin-bottom:12px;">조회만 가능합니다.</div>` : ""}
          <div class="form-grid">
            <div class="field"><label>날짜</label><input id="fDate" type="date" class="control" value="${escapeHtml(data.date)}" ${!canEdit?"disabled":""}></div>
            <div class="field"><label>구분</label><select id="fCategory" class="control" ${!canEdit?"disabled":""}>${cats}</select></div>
            <div class="field full"><label>스케쥴명</label><input id="fTitle" class="control" value="${escapeHtml(data.title)}" placeholder="예: HMD-2880 ACAP 검사" ${!canEdit?"disabled":""}></div>
            <div class="field"><label>상태</label><select id="fStatus" class="control" ${!canEdit?"disabled":""}>${STATUS_OPTIONS.map(s=>`<option value="${s}" ${data.status===s?"selected":""}>${s}</option>`).join("")}</select></div>
            <div class="field"><label>시작 시간</label><div class="time-input-wrap"><input id="fStart" type="text" inputmode="numeric" class="control" value="${escapeHtml(data.start_time || "09:00")}" placeholder="09:00" maxlength="5" ${!canEdit?"disabled":""}><button type="button" class="time-pick-btn" data-target="fStart" ${!canEdit?"disabled":""}>⌄</button></div></div>
            <div class="field"><label>종료 시간</label><div class="time-input-wrap"><input id="fEnd" type="text" inputmode="numeric" class="control" value="${escapeHtml(data.end_time)}" placeholder="--:--" maxlength="5" ${!canEdit?"disabled":""}><button type="button" class="time-pick-btn" data-target="fEnd" ${!canEdit?"disabled":""}>⌄</button></div></div>
            <div class="field"><label>장소</label><input id="fLocation" class="control" value="${escapeHtml(data.location)}" ${!canEdit?"disabled":""}></div>
            <div class="field"><label>고객/업체</label><input id="fCustomer" class="control" value="${escapeHtml(data.customer)}" ${!canEdit?"disabled":""}></div>
            <div class="field full"><label>메모</label><textarea id="fMemo" class="control" ${!canEdit?"disabled":""}>${escapeHtml(data.memo)}</textarea></div>
          </div>
          <details class="advanced">
            <summary>상세 입력</summary>
            <div class="inner">
              <div class="field"><label>프로젝트/호선</label><input id="fProject" class="control" value="${escapeHtml(data.project_no)}" ${!canEdit?"disabled":""}></div>
              <div class="field"><label>품목/Item</label><input id="fItem" class="control" value="${escapeHtml(data.item_code)}" ${!canEdit?"disabled":""}></div>
              <div class="field"><label>수량</label><input id="fQty" class="control" value="${escapeHtml(data.qty)}" placeholder="예: 2EA" ${!canEdit?"disabled":""}></div>
              <div class="field"><label>동행/참조자</label><input id="fSub" class="control" value="${escapeHtml(data.sub_user_names)}" ${!canEdit?"disabled":""}></div>
              <div class="field"><label>우선순위</label><select id="fPriority" class="control" ${!canEdit?"disabled":""}>${["일반","중요","긴급"].map(s=>`<option value="${s}" ${data.priority===s?"selected":""}>${s}</option>`).join("")}</select></div>
              <div class="field"><label>공개 범위</label><select id="fVisibility" class="control" ${!canEdit?"disabled":""}>${["팀","파트","개인"].map(s=>`<option value="${s}" ${data.visibility===s?"selected":""}>${s}</option>`).join("")}</select></div>
              <div class="field"><label>파트</label><select id="fPart" class="control" ${(!canEdit || !isAdmin())?"disabled":""}>${partOpts}</select></div>
              <div class="field"><label>담당자 ID</label><input id="fMainId" class="control" value="${escapeHtml(data.main_user_id)}" ${(!canEdit || !isAdmin())?"disabled":""}></div>
              <div class="field"><label>담당자명</label><input id="fMainName" class="control" value="${escapeHtml(data.main_user_name)}" ${(!canEdit || !isAdmin())?"disabled":""}></div>
            </div>
          </details>
          <div class="modal-actions">
            <div class="left-actions">
              ${!schedule ? `<button type="button" id="loadLastBtn" class="btn">최근 입력 불러오기</button>` : ""}
              ${schedule && canEdit ? `<button type="button" id="cancelScheduleBtn" class="btn danger">일정 취소</button>` : ""}
            </div>
            <div class="right-actions">
              <button type="button" class="btn closeBtn">닫기</button>
              ${canEdit ? `<button type="button" id="saveScheduleBtn" class="btn primary">저장</button>` : ""}
            </div>
          </div>
        </div>
      </div>`;
      document.body.appendChild(modal);
      bindTimeInput(modal.querySelector("#fStart"));
      bindTimeInput(modal.querySelector("#fEnd"));
      modal.querySelectorAll(".time-pick-btn").forEach(btn => {
        btn.onclick = (ev) => {
          ev.preventDefault();
          const input = modal.querySelector("#" + btn.dataset.target);
          if(input && !input.disabled) openTimeMenu(input);
        };
      });
      makeModalDraggable(modal);
      modal.querySelector(".modal-close").onclick = () => modal.remove();
      modal.querySelector(".closeBtn").onclick = () => modal.remove();
      const loadLastBtn = modal.querySelector("#loadLastBtn"); if(loadLastBtn) loadLastBtn.onclick = () => loadLastInput(modal);
      const saveBtn = modal.querySelector("#saveScheduleBtn"); if(saveBtn) saveBtn.onclick = () => saveSchedule(modal, schedule);
      const cancelBtn = modal.querySelector("#cancelScheduleBtn"); if(cancelBtn) cancelBtn.onclick = () => cancelSchedule(schedule, modal);
    }

    function collectForm(modal){
      return {
        date:modal.querySelector("#fDate").value,
        category:modal.querySelector("#fCategory").value,
        title:modal.querySelector("#fTitle").value.trim(),
        start_time:normalizeTimeInput(modal.querySelector("#fStart").value),
        end_time:normalizeTimeInput(modal.querySelector("#fEnd").value),
        location:modal.querySelector("#fLocation").value.trim(),
        customer:modal.querySelector("#fCustomer").value.trim(),
        memo:modal.querySelector("#fMemo").value.trim(),
        project_no:modal.querySelector("#fProject").value.trim(),
        item_code:modal.querySelector("#fItem").value.trim(),
        qty:modal.querySelector("#fQty").value.trim(),
        sub_user_names:modal.querySelector("#fSub").value.trim(),
        status:modal.querySelector("#fStatus").value,
        priority:modal.querySelector("#fPriority").value,
        visibility:modal.querySelector("#fVisibility").value,
        part:modal.querySelector("#fPart").value,
        main_user_id:modal.querySelector("#fMainId").value.trim(),
        main_user_name:modal.querySelector("#fMainName").value.trim()
      };
    }

    function loadLastInput(modal){
      const saved = localStorage.getItem(LAST_INPUT_KEY);
      if(!saved){ toast("최근 입력값이 없습니다."); return; }
      try{
        const data = JSON.parse(saved);
        const set = (id, value) => { const el = modal.querySelector(id); if(el && value != null) el.value = value; };
        set("#fCategory", data.category); set("#fTitle", data.title); set("#fStart", normalizeTimeInput(data.start_time)); set("#fEnd", normalizeTimeInput(data.end_time));
        set("#fLocation", data.location); set("#fCustomer", data.customer); set("#fMemo", data.memo); set("#fStatus", data.status); set("#fProject", data.project_no);
        set("#fItem", data.item_code); set("#fQty", data.qty); set("#fSub", data.sub_user_names); set("#fPriority", data.priority); set("#fVisibility", data.visibility);
        toast("최근 입력값을 불러왔습니다.");
      }catch(e){ toast("최근 입력값을 불러오지 못했습니다."); }
    }


    function queueStatusChange(rawIds, status, selectEl){
      const ids = String(rawIds || "").split("|").map(v => v.trim()).filter(Boolean);
      if(!ids.length) return;
      let changed = 0;
      ids.forEach(id => {
        const item = state.schedules.find(s => s.schedule_id === id);
        if(!item || !canEditSchedule(item)) return;
        const original = item.status || "예정";
        if(status === original) delete state.pendingStatusChanges[id];
        else { state.pendingStatusChanges[id] = status; changed++; }
      });
      if(selectEl) selectEl.classList.toggle("is-pending", ids.some(id => state.pendingStatusChanges[id] !== undefined));
      updatePendingStatusUi();
      if(changed) toast("상태가 임시 변경되었습니다. 저장 버튼을 눌러 반영하세요.");
    }

    function updatePendingStatusUi(){
      const ids = Object.keys(state.pendingStatusChanges);
      const btn = document.getElementById("saveStatusChangesBtn");
      if(btn){
        btn.classList.toggle("hidden", ids.length === 0);
        btn.textContent = ids.length ? `상태 변경 저장 (${ids.length})` : "상태 변경 저장";
      }
      document.querySelectorAll(".quick-status").forEach(el => {
        const idsForEl = String(el.dataset.ids || el.dataset.id || "").split("|").filter(Boolean);
        el.classList.toggle("is-pending", idsForEl.some(id => state.pendingStatusChanges[id] !== undefined));
      });
    }

    async function savePendingStatusChanges(){
      const changes = Object.entries(state.pendingStatusChanges);
      if(!changes.length){ toast("저장할 상태 변경이 없습니다."); return; }
      const btn = document.getElementById("saveStatusChangesBtn");
      let safetyTimer = null;
      const resetSavingUi = () => {
        hideBusy();
        setInlineSaving("");
        if(btn){ btn.disabled = false; }
        updatePendingStatusUi();
      };
      if(btn){ btn.disabled = true; btn.textContent = "저장 중..."; }
      setInlineSaving("상태 변경 저장 중...");
      showBusy("상태 변경 저장 중...");
      safetyTimer = setTimeout(() => {
        resetSavingUi();
        toast("저장 응답이 지연되어 화면을 복구했습니다. 잠시 후 조회를 눌러 확인해주세요.");
      }, Math.max(18000, changes.length * 7000));
      const failed = [];
      let savedCount = 0;
      try{
        for(let i=0; i<changes.length; i++){
          const [scheduleId, status] = changes[i];
          const item = state.schedules.find(s => s.schedule_id === scheduleId);
          if(!item || !canEditSchedule(item)) { delete state.pendingStatusChanges[scheduleId]; continue; }
          setInlineSaving(`상태 변경 저장 중... ${i+1}/${changes.length}`);
          try{
            const res = await jsonp("updateSchedule", Object.assign({}, userParams(), { schedule_id:scheduleId, status }));
            if(isUnsupportedScheduleApi(res)) throw new Error(scheduleApiErrorMessage());
            if(!res.success) throw new Error(res.message || "상태 저장 실패");
            item.status = status;
            delete state.pendingStatusChanges[scheduleId];
            savedCount++;
          }catch(err){
            failed.push({ scheduleId, message: err.message || "저장 실패" });
          }
        }
        renderKpis();
        renderSchedules();
        if(failed.length){
          toast(`상태 ${savedCount}건 저장, ${failed.length}건 실패`);
        }else{
          toast("상태 변경이 저장되었습니다.");
          setTimeout(() => loadSchedules(), 250);
        }
      }finally{
        if(safetyTimer) clearTimeout(safetyTimer);
        resetSavingUi();
      }
    }

    function makeModalDraggable(modal){
      const card = modal.querySelector(".modal-card");
      const head = modal.querySelector(".modal-head");
      if(!card || !head || window.innerWidth < 760) return;
      let dragging = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;
      head.addEventListener("mousedown", (ev) => {
        if(ev.target.closest("button")) return;
        const rect = card.getBoundingClientRect();
        card.style.position = "fixed";
        card.style.left = rect.left + "px";
        card.style.top = rect.top + "px";
        card.style.margin = "0";
        card.style.width = rect.width + "px";
        card.style.maxHeight = "calc(100vh - 24px)";
        dragging = true; startX = ev.clientX; startY = ev.clientY; startLeft = rect.left; startTop = rect.top;
        document.body.style.userSelect = "none";
      });
      window.addEventListener("mousemove", (ev) => {
        if(!dragging) return;
        const maxLeft = Math.max(8, window.innerWidth - card.offsetWidth - 8);
        const maxTop = Math.max(8, window.innerHeight - 80);
        const left = Math.min(maxLeft, Math.max(8, startLeft + ev.clientX - startX));
        const top = Math.min(maxTop, Math.max(8, startTop + ev.clientY - startY));
        card.style.left = left + "px";
        card.style.top = top + "px";
      });
      window.addEventListener("mouseup", () => { dragging = false; document.body.style.userSelect = ""; });
    }

    async function saveSchedule(modal, schedule){
      const data = collectForm(modal);
      if(!data.date || !data.category || !data.title){ toast("날짜, 구분, 스케쥴명은 필수입니다."); return; }
      const btn = modal.querySelector("#saveScheduleBtn"); btn.disabled=true; btn.textContent="저장 중...";
      showBusy("스케쥴 저장 중...");
      try{
        const action = schedule ? "updateSchedule" : "createSchedule";
        const params = Object.assign({}, userParams(), data);
        if(schedule) params.schedule_id = schedule.schedule_id;
        const res = await jsonp(action, params);
        if(isUnsupportedScheduleApi(res)) throw new Error(scheduleApiErrorMessage());
        if(!res.success) throw new Error(res.message || "저장 실패");
        localStorage.setItem(LAST_INPUT_KEY, JSON.stringify(data));
        modal.remove();
        toast(res.message || "저장되었습니다.");
        await loadSchedules();
      }catch(err){ toast(err.message); }
      finally{ hideBusy(); btn.disabled=false; btn.textContent="저장"; }
    }

    async function cancelSchedule(schedule, modal){
      if(!confirm("이 스케쥴을 취소 처리할까요?")) return;
      showBusy("스케쥴 취소 처리 중...");
      try{
        const res = await jsonp("cancelSchedule", Object.assign({}, userParams(), { schedule_id:schedule.schedule_id }));
        if(isUnsupportedScheduleApi(res)) throw new Error(scheduleApiErrorMessage());
        if(!res.success) throw new Error(res.message || "취소 실패");
        modal.remove(); toast("스케쥴이 취소되었습니다."); await loadSchedules();
      }catch(err){ toast(err.message); }
      finally{ hideBusy(); }
    }

    async function initApp(){
      if(!state.user){ state.user = loadSavedUser(); }
      if(!state.user){ renderLogin(); return; }
      await refreshUserFromServerIfNeeded();
      if(!state.part && state.user.part && PARTS.includes(state.user.part)) state.part = state.user.part;
      renderShell();
      await loadCategories();
      renderShell();
      await loadSchedules();
    }

    initApp();
  </script>
</body>
</html>
