<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검사/업무 스케쥴</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #203a69;
      --blue: #2563eb;
      --line: #e2e8f0;
      --line2: #edf1f7;
      --bg: #f4f6fb;
      --card: #ffffff;
      --shadow: 0 4px 18px rgba(15,23,42,.09);
      --shadow-sm: 0 2px 8px rgba(15,23,42,.06);

      /* Team colors */
      --c-qa:      #2563eb;
      --c-ship:    #0891b2;
      --c-ocean:   #059669;
      --c-ind:     #d97706;
      --c-fan:     #7c3aed;
      --c-fuel:    #db2777;
      --c-lead:    #64748b;
      --c-etc:     #94a3b8;

      /* Category colors */
      --cat-inspection:   #2563eb;
      --cat-customer:     #16a34a;
      --cat-audit:        #d97706;
      --cat-trip:         #7c3aed;
      --cat-internal:     #475569;
      --cat-etc:          #64748b;
    }

    body { font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: var(--bg); color: #1e293b; font-size: 14px; min-height: 100vh; }

    /* ── Topbar ──────────────────────────────────────────────── */
    .topbar { position: sticky; top: 0; z-index: 40; background: #fff; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; padding: 0 20px; height: 56px; box-shadow: 0 2px 8px rgba(15,23,42,.06); }
    .topbar-logo { font-weight: 950; color: var(--navy); font-size: 15px; letter-spacing: -.02em; white-space: nowrap; margin-right: 4px; }
    .topbar-sep { color: #cbd5e1; }
    .topbar-title { color: #475569; font-size: 13px; font-weight: 800; }
    .topbar-user { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .topbar-chip { display: inline-flex; align-items: center; height: 26px; padding: 0 10px; border-radius: 999px; background: #eef4ff; color: var(--navy); font-size: 12px; font-weight: 800; }
    .topbar-chip.part { background: #f0fdf4; color: #166534; }
    .topbar-btn { border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 5px 12px; font-size: 12px; font-weight: 800; color: #475569; cursor: pointer; transition: .14s; }
    .topbar-btn:hover { border-color: var(--blue); color: var(--blue); }
    .topbar-btn.primary { background: var(--navy); border-color: var(--navy); color: #fff; }
    .topbar-btn.primary:hover { background: #2d4f8a; }

    /* ── Shell Layout ─────────────────────────────────────────── */
    .shell { display: flex; height: calc(100vh - 56px); overflow: hidden; }

    /* ── Left Sidebar ─────────────────────────────────────────── */
    .side { width: 220px; flex: 0 0 220px; background: #fff; border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
    .side-mini-cal { padding: 16px 14px 10px; }
    .mini-cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .mini-cal-title { font-size: 14px; font-weight: 950; color: var(--navy); }
    .mini-cal-nav { display: flex; gap: 2px; }
    .mini-cal-nav button { border: 0; background: transparent; color: #64748b; font-size: 15px; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mini-cal-nav button:hover { background: #eef4ff; color: var(--navy); }
    .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .mc-day-name { text-align: center; font-size: 10px; font-weight: 950; color: #94a3b8; padding: 2px 0 4px; }
    .mc-day { text-align: center; font-size: 11.5px; font-weight: 800; color: #475569; padding: 3px 1px; border-radius: 6px; cursor: pointer; line-height: 1.6; }
    .mc-day:hover { background: #eef4ff; color: var(--navy); }
    .mc-day.today { background: var(--blue); color: #fff; border-radius: 50%; }
    .mc-day.selected { background: var(--navy); color: #fff; border-radius: 50%; }
    .mc-day.other-month { color: #cbd5e1; }
    .mc-day.has-events::after { content: "·"; display: block; text-align: center; color: var(--blue); font-size: 10px; margin-top: -4px; line-height: 1; }
    .mc-day.today.has-events::after, .mc-day.selected.has-events::after { color: rgba(255,255,255,.7); }

    .side-section { padding: 10px 14px 6px; border-top: 1px solid var(--line2); }
    .side-section-title { font-size: 11px; font-weight: 950; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 7px; padding: 4px 0; cursor: pointer; border-radius: 6px; }
    .legend-item:hover { background: #f8fafc; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 10px; }
    .legend-label { font-size: 12px; font-weight: 800; color: #334155; }
    .legend-count { margin-left: auto; font-size: 11px; color: #94a3b8; font-weight: 800; }
    .legend-item.dimmed .legend-dot { opacity: .3; }
    .legend-item.dimmed .legend-label { color: #94a3b8; }

    /* ── Main Area ────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── View Toolbar ─────────────────────────────────────────── */
    .view-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: #fff; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
    .view-bar-left { display: flex; align-items: center; gap: 8px; }
    .view-bar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .nav-btn { border: 1px solid var(--line); background: #fff; border-radius: 8px; width: 32px; height: 32px; font-size: 16px; color: #475569; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .12s; }
    .nav-btn:hover { border-color: var(--blue); color: var(--blue); }
    .period-title { font-size: 16px; font-weight: 950; color: var(--navy); min-width: 160px; text-align: center; letter-spacing: -.02em; }
    .today-btn { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 800; color: #475569; cursor: pointer; transition: .12s; }
    .today-btn:hover { border-color: var(--blue); color: var(--blue); }
    .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #f8fafc; }
    .seg button { border: 0; background: transparent; padding: 6px 14px; font-size: 12px; font-weight: 800; color: #475569; cursor: pointer; transition: .12s; white-space: nowrap; }
    .seg button.active { background: var(--navy); color: #fff; }
    .seg button:hover:not(.active) { background: #eef4ff; color: var(--navy); }

    /* ── Scope filter ─────────────────────────────────────────── */
    .scope-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; background: #f8fafc; border-bottom: 1px solid var(--line2); flex-wrap: wrap; }
    .scope-bar label { font-size: 11.5px; font-weight: 850; color: #64748b; }
    .scope-tabs { display: inline-flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fff; flex-shrink: 0; }
    .scope-tab { border: 0; background: transparent; padding: 5px 14px; font-size: 12px; font-weight: 800; color: #475569; cursor: pointer; transition: .12s; white-space: nowrap; font-family: inherit; }
    .scope-tab.active { background: var(--navy); color: #fff; }
    .scope-tab:hover:not(.active) { background: #eef4ff; color: var(--navy); }
    .scope-select { border: 1px solid var(--line); border-radius: 8px; padding: 4px 8px; font-size: 12px; font-weight: 800; color: var(--navy); background: #fff; cursor: pointer; outline: none; }
    .scope-select:focus { border-color: var(--blue); }
    .search-input { border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #334155; background: #fff; outline: none; min-width: 120px; }
    .search-input:focus { border-color: var(--blue); }
    .scope-bar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .kpi-strip { display: flex; gap: 6px; }
    .kpi-chip { display: inline-flex; align-items: center; gap: 4px; height: 26px; padding: 0 10px; border-radius: 999px; font-size: 11.5px; font-weight: 950; }
    .kpi-chip.total { background: #eef4ff; color: var(--navy); }
    .kpi-chip.active { background: #ecfdf5; color: #166534; }
    .kpi-chip.done { background: #f0fdf4; color: #14532d; }
    .kpi-chip.cancel { background: #fef2f2; color: #991b1b; }
    .save-pending-btn { border: 1px solid #2563eb; background: #2563eb; border-radius: 8px; padding: 5px 13px; font-size: 12px; font-weight: 850; color: #fff; cursor: pointer; transition: .12s; white-space: nowrap; font-family: inherit; animation: pulse-save 1.8s ease-in-out infinite; }
    .save-pending-btn:hover { background: #1d4ed8; border-color: #1d4ed8; }
    @keyframes pulse-save { 0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.4)} 50%{box-shadow:0 0 0 6px rgba(37,99,235,0)} }

    /* ── Calendar ─────────────────────────────────────────────── */
    .cal-wrap { flex: 1; overflow: auto; }

    /* Month view */
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); min-width: 700px; }
    .month-dh { background: #f8fafc; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line2); padding: 8px 12px; font-size: 12px; font-weight: 950; color: #64748b; text-align: center; }
    .month-dh:last-child { border-right: 0; }
    .month-cell { border-right: 1px solid var(--line2); border-bottom: 1px solid var(--line2); min-height: 120px; padding: 6px; background: #fff; vertical-align: top; }
    .month-cell:nth-child(7n) { border-right: 0; }
    .month-cell.other-month { background: #f8fafc; }
    .month-cell.today { background: #eff6ff; }
    .mc-date-num { font-size: 12px; font-weight: 950; color: #334155; margin-bottom: 4px; display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; }
    .month-cell.today .mc-date-num { background: var(--blue); color: #fff; }
    .month-cell.other-month .mc-date-num { color: #cbd5e1; }
    .event-chip { display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 5px; font-size: 11px; font-weight: 800; margin-bottom: 2px; cursor: pointer; line-height: 1.4; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; transition: opacity .12s; }
    .event-chip:hover { opacity: .8; }
    .event-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 6px; }
    .event-chip .chip-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .more-chip { font-size: 11px; font-weight: 800; color: #64748b; padding: 1px 4px; cursor: pointer; }
    .more-chip:hover { color: var(--blue); }

    /* Week view */
    .week-wrap { display: flex; min-width: 700px; }
    .week-time-col { width: 52px; flex: 0 0 52px; background: #f8fafc; border-right: 1px solid var(--line); }
    .week-time-head { height: 60px; border-bottom: 1px solid var(--line); }
    .week-time-slot { height: 52px; border-bottom: 1px solid var(--line2); display: flex; align-items: flex-start; justify-content: flex-end; padding: 2px 6px 0 0; font-size: 10.5px; color: #94a3b8; font-weight: 850; }
    .week-days { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; min-width: 0; }
    .week-day-col { border-right: 1px solid var(--line2); min-width: 0; }
    .week-day-col:last-child { border-right: 0; }
    .week-dh { height: 60px; border-bottom: 1px solid var(--line); background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
    .week-dh.today { background: #eff6ff; }
    .week-dh-name { font-size: 11px; font-weight: 950; color: #64748b; text-transform: uppercase; }
    .week-dh-num { font-size: 20px; font-weight: 950; color: #334155; line-height: 1; }
    .week-dh.today .week-dh-num { color: var(--blue); }
    .week-allday { min-height: 0; border-bottom: 1px solid var(--line); padding: 4px; background: #fafbfd; }
    .week-allday-label { position: sticky; top: 60px; font-size: 10px; color: #94a3b8; font-weight: 850; padding: 2px 0; }
    .week-timed { position: relative; }
    .week-slot { height: 48px; border-bottom: 1px solid var(--line2); }
    .week-slot:last-child { border-bottom: 0; }
    .timed-event { position: absolute; left: 2px; right: 2px; border-radius: 6px; padding: 2px 5px; font-size: 11px; font-weight: 800; overflow: hidden; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.12); z-index: 1; transition: opacity .12s; min-height: 18px; }
    .timed-event:hover { opacity: .85; z-index: 2; }
    .timed-event .ev-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .timed-event .ev-time { font-size: 10px; opacity: .85; white-space: nowrap; }

    /* Team/Part Overview (used for scope=part/team in week view) */
    .overview-grid { display: grid; gap: 14px; padding: 16px 20px; }
    .team-row { background: #fff; border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
    .team-row-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line2); }
    .team-color-bar { width: 4px; height: 28px; border-radius: 3px; flex: 0 0 4px; }
    .team-row-name { font-size: 14px; font-weight: 950; color: var(--navy); }
    .team-row-count { margin-left: auto; font-size: 12px; font-weight: 800; color: #64748b; }
    .team-events { padding: 8px 10px; display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px; }
    .team-event-card { display: flex; align-items: flex-start; gap: 6px; background: #f8fafc; border: 1px solid var(--line2); border-radius: 10px; padding: 6px 10px; min-width: 160px; max-width: 260px; cursor: pointer; transition: .12s; }
    .team-event-card:hover { border-color: #93c5fd; background: #eff6ff; }
    .team-event-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; margin-top: 3px; }
    .team-event-body { min-width: 0; }
    .team-event-title { font-size: 12px; font-weight: 950; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .team-event-meta { font-size: 11px; color: #64748b; font-weight: 800; margin-top: 1px; }
    .team-empty { color: #cbd5e1; font-size: 12px; padding: 4px 6px; }

    /* List view */
    .list-wrap { padding: 16px 20px; }
    .list-date-group { margin-bottom: 18px; }
    .list-date-label { font-size: 13px; font-weight: 950; color: #64748b; padding: 6px 0; border-bottom: 1px solid var(--line2); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .list-date-label .date-today-badge { background: var(--blue); color: #fff; border-radius: 999px; font-size: 10.5px; padding: 1px 7px; }
    .list-event { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; background: #fff; border: 1px solid var(--line); margin-bottom: 6px; cursor: pointer; transition: .12s; }
    .list-event:hover { border-color: #93c5fd; box-shadow: 0 2px 8px rgba(37,99,235,.1); }
    .list-event-bar { width: 4px; min-height: 36px; border-radius: 3px; flex: 0 0 4px; }
    .list-event-time { font-size: 11.5px; font-weight: 950; color: #475569; min-width: 80px; white-space: nowrap; }
    .list-event-body { flex: 1; min-width: 0; }
    .list-event-title { font-size: 13px; font-weight: 950; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-event-meta { font-size: 11.5px; color: #64748b; font-weight: 800; margin-top: 2px; }
    .list-event-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-left: auto; }
    .badge { display: inline-flex; align-items: center; height: 20px; padding: 0 7px; border-radius: 999px; font-size: 10.5px; font-weight: 950; }
    .b-inspection { background: #dbeafe; color: #1e40af; }
    .b-customer   { background: #dcfce7; color: #14532d; }
    .b-audit      { background: #fef3c7; color: #78350f; }
    .b-trip       { background: #ede9fe; color: #4c1d95; }
    .b-internal   { background: #f1f5f9; color: #334155; }
    .b-etc        { background: #f1f5f9; color: #475569; }
    .b-done       { background: #dcfce7; color: #166534; }
    .b-cancel     { background: #fee2e2; color: #991b1b; }
    .b-status     { background: #f1f5f9; color: #334155; }
    .b-part       { background: #ede9fe; color: #5b21b6; }

    /* ── Event Popover ────────────────────────────────────────── */
    .popover { position: fixed; z-index: 100; width: min(340px, calc(100vw - 32px)); background: #fff; border: 1px solid #e0e7ef; border-radius: 18px; box-shadow: 0 12px 38px rgba(15,23,42,.20); padding: 0; overflow: hidden; }
    .popover-head { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px 12px; border-bottom: 1px solid var(--line2); }
    .popover-color-bar { width: 4px; min-height: 40px; border-radius: 3px; flex: 0 0 4px; }
    .popover-title-wrap { flex: 1; min-width: 0; }
    .popover-title { font-size: 15px; font-weight: 950; color: #1e293b; line-height: 1.3; }
    .popover-sub { font-size: 12px; color: #64748b; font-weight: 800; margin-top: 3px; }
    .popover-close { border: 0; background: #f1f5f9; border-radius: 999px; width: 28px; height: 28px; font-size: 16px; color: #475569; cursor: pointer; flex: 0 0 28px; display: flex; align-items: center; justify-content: center; }
    .popover-body { padding: 12px 16px; display: grid; gap: 7px; }
    .popover-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: #334155; }
    .popover-row-icon { width: 16px; text-align: center; color: #94a3b8; flex: 0 0 16px; margin-top: 1px; }
    .popover-row-text { flex: 1; line-height: 1.4; }
    .popover-actions { display: flex; gap: 6px; padding: 10px 16px 14px; border-top: 1px solid var(--line2); }
    .popover-btn { flex: 1; border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 7px 0; font-size: 12px; font-weight: 800; color: #475569; cursor: pointer; transition: .12s; }
    .popover-btn:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }
    .popover-btn.primary { background: var(--navy); border-color: var(--navy); color: #fff; }
    .popover-btn.primary:hover { background: #2d4f8a; border-color: #2d4f8a; }
    .popover-btn.danger { border-color: #fca5a5; color: #dc2626; }
    .popover-btn.danger:hover { background: #fef2f2; }

    /* ── Form Modal ───────────────────────────────────────────── */
    .modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(15,23,42,.45); display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px 48px; overflow: auto; }
    .modal-card { width: min(700px, calc(100vw - 32px)); background: #fff; border-radius: 22px; box-shadow: 0 24px 64px rgba(15,23,42,.28); border: 1px solid #e0e7ef; display: flex; flex-direction: column; max-height: calc(100vh - 48px); }
    .modal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 18px 24px 14px; border-bottom: 1px solid var(--line); }
    .modal-head h3 { font-size: 18px; font-weight: 950; color: var(--navy); margin: 0; }
    .modal-close { border: 0; background: #eef2f7; border-radius: 999px; width: 32px; height: 32px; font-size: 18px; color: #475569; cursor: pointer; flex: 0 0 32px; display: flex; align-items: center; justify-content: center; }
    .modal-body { padding: 18px 24px; overflow: auto; flex: 1; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
    .form-grid .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 850; color: #52627a; }
    .control { border: 1px solid #cdd7e5; border-radius: 12px; padding: 0 12px; min-height: 42px; color: #1e293b; background: #fff; outline: none; font-size: 13px; width: 100%; }
    .control:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    textarea.control { min-height: 80px; padding: 10px 12px; resize: vertical; line-height: 1.55; }
    .control:disabled { background: #f8fafc; color: #94a3b8; cursor: not-allowed; }
    details.advanced { margin-top: 14px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #f8fafc; }
    details.advanced summary { padding: 11px 16px; font-weight: 950; color: var(--navy); font-size: 13px; cursor: pointer; background: #f3f6fb; }
    details.advanced .adv-inner { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; padding: 14px 24px 16px; border-top: 1px solid var(--line); background: #fff; }
    .modal-footer-left, .modal-footer-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-footer-right { margin-left: auto; }
    .btn { border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 800; color: #475569; cursor: pointer; transition: .14s; }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn.primary { background: var(--navy); border-color: var(--navy); color: #fff; }
    .btn.primary:hover { background: #2d4f8a; border-color: #2d4f8a; }
    .btn.danger { border-color: #fca5a5; color: #dc2626; }
    .btn.danger:hover { background: #fef2f2; }
    .time-wrap { position: relative; display: flex; align-items: center; }
    .time-wrap .control { padding-right: 36px; }
    .time-pick-btn { position: absolute; right: 8px; border: 0; background: transparent; color: #94a3b8; font-size: 14px; cursor: pointer; padding: 4px; }
    .time-pick-btn:hover { color: var(--navy); }
    .time-menu { position: fixed; z-index: 120; width: 130px; max-height: 210px; overflow: auto; background: #fff; border: 1px solid #dde4ef; border-radius: 12px; box-shadow: 0 12px 32px rgba(15,23,42,.16); padding: 5px; }
    .time-menu button { display: block; width: 100%; border: 0; background: transparent; border-radius: 7px; padding: 7px 10px; text-align: left; font-size: 12.5px; font-weight: 800; color: #334155; cursor: pointer; }
    .time-menu button:hover, .time-menu button.active { background: #eef4ff; color: var(--navy); }

    /* ── Status pills (direct-click status buttons) ─────────── */
    .status-pill { border: 1px solid #e2e8f0; border-radius: 999px; background: transparent; padding: 3px 9px; font-size: 11.5px; font-weight: 800; cursor: pointer; transition: .12s; line-height: 1.4; }
    .status-pill:hover:not(.active) { filter: brightness(.9); background: #f8fafc; }
    .status-pill.active { font-weight: 950; }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast { position: fixed; right: 20px; bottom: 20px; z-index: 200; background: #172b50; color: #fff; padding: 11px 16px; border-radius: 12px; font-size: 13px; font-weight: 800; box-shadow: 0 8px 24px rgba(15,23,42,.22); pointer-events: none; }

    /* ── Busy mask ────────────────────────────────────────────── */
    .busy-mask { position: fixed; inset: 0; z-index: 300; background: rgba(15,23,42,.28); display: flex; align-items: center; justify-content: center; }
    .busy-card { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 16px; padding: 16px 20px; font-weight: 950; color: var(--navy); box-shadow: 0 16px 40px rgba(15,23,42,.24); border: 1px solid var(--line); }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(37,99,235,.2); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login ────────────────────────────────────────────────── */
    .login-wrap { max-width: 440px; margin: 80px auto; background: #fff; border: 1px solid var(--line); border-radius: 22px; padding: 28px; box-shadow: var(--shadow); }
    .login-wrap h2 { color: var(--navy); margin-bottom: 6px; }
    .login-wrap p { color: #64748b; font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
    .login-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .side { display: none; }
      .view-bar { padding: 8px 12px; }
      .scope-bar { padding: 6px 12px; }
      .period-title { font-size: 14px; min-width: 120px; }
      .seg button { padding: 5px 9px; }
      .month-grid { min-width: 360px; }
      .week-wrap { min-width: 560px; }
      .form-grid, details.advanced .adv-inner { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  /* ─────────────────────────────────────────────────────────────
     Constants & State
  ───────────────────────────────────────────────────────────── */
  const DEFAULT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwn9I60-14GHDQk_rNF_uJYBpig-Bovl7Qqje_eGGjcFmZJZfqQgtpUg6necytvlQQ-/exec";
  const URL_PARAMS = new URLSearchParams(window.location.search);
  const PARENT_URL = (() => { try { return window.parent?.HAK_WEB_APP_URL || ""; } catch(e){ return ""; } })();
  const WEB_APP_URL = URL_PARAMS.get("api") || PARENT_URL || DEFAULT_WEB_APP_URL;

  const LOGIN_KEY = "hak_login_user";
  const LOGIN_EXPIRE_MS = 30 * 60 * 1000;
  const LAST_INPUT_KEY = "hak_schedule_last_input";

  const PARTS = ["QA","상선/해군","해양","산업공조","FAN","FUELCELL","팀장"];
  const PART_COLORS = {
    "QA":       { bg:"#dbeafe", text:"#1e40af", dot:"var(--c-qa)" },
    "상선/해군":  { bg:"#cffafe", text:"#155e75", dot:"var(--c-ship)" },
    "해양":      { bg:"#d1fae5", text:"#065f46", dot:"var(--c-ocean)" },
    "산업공조":  { bg:"#fef3c7", text:"#78350f", dot:"var(--c-ind)" },
    "FAN":      { bg:"#ede9fe", text:"#4c1d95", dot:"var(--c-fan)" },
    "FUELCELL": { bg:"#fce7f3", text:"#831843", dot:"var(--c-fuel)" },
    "팀장":      { bg:"#f1f5f9", text:"#334155", dot:"var(--c-lead)" },
  };
  const PART_DOT_COLORS = {
    "QA":"#2563eb","상선/해군":"#0891b2","해양":"#059669",
    "산업공조":"#d97706","FAN":"#7c3aed","FUELCELL":"#db2777","팀장":"#64748b"
  };

  const DEFAULT_CATEGORIES = [
    { category:"INSPECTION",    display_name:"검사",    color:"#2563eb" },
    { category:"CUSTOMER",      display_name:"고객검사", color:"#16a34a" },
    { category:"AUDIT",         display_name:"업체감사", color:"#d97706" },
    { category:"BUSINESS_TRIP", display_name:"출장검사", color:"#7c3aed" },
    { category:"INTERNAL",      display_name:"내부업무", color:"#475569" },
    { category:"ETC",           display_name:"기타",    color:"#64748b" },
  ];
  const CAT_BADGE = {
    "INSPECTION":"b-inspection","CUSTOMER":"b-customer","AUDIT":"b-audit",
    "BUSINESS_TRIP":"b-trip","INTERNAL":"b-internal","ETC":"b-etc"
  };
  const STATUS_OPTIONS = ["예정","확정","진행","완료","취소","보류"];

  const state = {
    user: null,
    categories: [],
    schedules: [],
    loading: false,
    view: "month",    /* month | week | list */
    scope: "mine",    /* mine | part | team */
    cursor: new Date(),
    filterPart: "",
    filterPerson: "",
    filterCategory: "",
    filterStatus: "",
    hiddenParts: new Set(),
    editSchedule: null,
    pendingStatusChanges: {},
    miniCalDate: new Date(),
  };

  /* ─────────────────────────────────────────────────────────────
     Utils
  ───────────────────────────────────────────────────────────── */
  const pad = n => String(n).padStart(2,"0");
  const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const parseDate = s => { const d = new Date(String(s||"").replace(/-/g,"/")); return isNaN(d) ? null : d; };
  const weekdayShort = d => ["일","월","화","수","목","금","토"][d.getDay()];
  const cloneDate = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const mondayOf = d => { const x=cloneDate(d); const day=x.getDay(); x.setDate(x.getDate()+(day===0?-6:1-day)); return x; };
  const esc = v => String(v==null?"":v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c]));
  const todayStr = () => ymd(new Date());

  function formatTime(v) {
    if(!v) return "";
    const t = String(v).trim();
    const m = t.match(/^(\d{1,2}):(\d{2})/);
    if(m) return pad(m[1])+":"+m[2];
    const d = new Date(t);
    if(!isNaN(d)) return pad(d.getHours())+":"+pad(d.getMinutes());
    return t.slice(0,5)||"";
  }
  function normalizeTime(v) {
    let t = String(v||"").trim();
    if(!t) return "";
    let pm = /오후|pm/i.test(t);
    t = t.replace(/오전|오후|AM|PM/gi,"").trim();
    const m = t.match(/^(\d{1,2})(?::?(\d{2}))?$/);
    if(m) { let h=+m[1]; const min=m[2]||"00"; if(pm&&h<12)h+=12; if(h>=0&&h<=23) return pad(h)+":"+min; }
    return formatTime(t);
  }
  function displayTime(s) {
    const st = formatTime(s.start_time), en = formatTime(s.end_time);
    return (st&&en) ? `${st}~${en}` : st||en||"";
  }

  function categoryInfo(code) {
    const cats = state.categories.length ? state.categories : DEFAULT_CATEGORIES;
    return cats.find(c=>c.category===code) || { display_name:code||"기타", color:"#64748b" };
  }
  function partDot(part) { return PART_DOT_COLORS[part] || "#94a3b8"; }

  function eventColor(s) {
    const ci = categoryInfo(s.category);
    return ci.color || "#64748b";
  }

  /* Chip bg = lighter version of event color (inline style) */
  function chipStyle(s) {
    const col = eventColor(s);
    return `background:${col}22;color:${col};`;
  }
  function barStyle(s) { return `background:${eventColor(s)};`; }

  /* ─────────────────────────────────────────────────────────────
     Auth
  ───────────────────────────────────────────────────────────── */
  function loadSavedUser() {
    try {
      const raw = localStorage.getItem(LOGIN_KEY);
      if(!raw) return null;
      const p = JSON.parse(raw);
      if(!p.user||!p.lastActivity) return null;
      if(Date.now()-p.lastActivity>LOGIN_EXPIRE_MS){ localStorage.removeItem(LOGIN_KEY); return null; }
      p.lastActivity = Date.now();
      localStorage.setItem(LOGIN_KEY, JSON.stringify(p));
      return p.user;
    } catch(e){ return null; }
  }
  function saveUser(user) {
    state.user = user;
    localStorage.setItem(LOGIN_KEY, JSON.stringify({ user, lastActivity:Date.now() }));
  }
  function userParams() {
    return { user_id:state.user.user_id, user_name:state.user.name, emp_no:state.user.emp_no };
  }
  const isAdmin = () => state.user && String(state.user.role||"").toLowerCase()==="admin";
  const canEdit = s => !s || isAdmin() || s.main_user_id===state.user.user_id || s.created_by_user_id===state.user.user_id;

  /* ─────────────────────────────────────────────────────────────
     JSONP
  ───────────────────────────────────────────────────────────── */
  function jsonp(action, params={}) {
    return new Promise((resolve,reject) => {
      const cb = "hakCal_"+Date.now()+"_"+Math.random().toString(36).slice(2);
      const q = new URLSearchParams({ action, callback:cb });
      Object.keys(params).forEach(k => { if(params[k]!=null&&params[k]!=="") q.append(k,params[k]); });
      const el = document.createElement("script");
      const t = setTimeout(()=>{ cleanup(); reject(new Error("요청 시간이 초과되었습니다.")); },12000);
      function cleanup(){ clearTimeout(t); delete window[cb]; el.remove(); }
      window[cb] = d => { cleanup(); resolve(d); };
      el.onerror = () => { cleanup(); reject(new Error("서버 연결에 실패했습니다.")); };
      el.src = WEB_APP_URL+"?"+q;
      document.body.appendChild(el);
    });
  }
  function isApiError(r){ return r&&r.success===false&&/잘못된 요청/.test(String(r.message||"")); }

  /* ─────────────────────────────────────────────────────────────
     UI helpers
  ───────────────────────────────────────────────────────────── */
  function toast(msg) {
    const old=document.querySelector(".toast"); if(old) old.remove();
    const el=document.createElement("div"); el.className="toast"; el.textContent=msg;
    document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
  }
  function showBusy(msg) {
    hideBusy();
    const el=document.createElement("div"); el.className="busy-mask"; el.id="busyMask";
    el.innerHTML=`<div class="busy-card"><div class="spinner"></div><span>${esc(msg||"처리 중...")}</span></div>`;
    document.body.appendChild(el);
  }
  function hideBusy(){ const el=document.getElementById("busyMask"); if(el) el.remove(); }
  function closePopover(){ const p=document.querySelector(".popover"); if(p) p.remove(); }

  /* Time picker dropdown */
  const TIME_OPTIONS = (() => { const a=[]; for(let h=0;h<24;h++) for(const m of [0,30]) a.push(pad(h)+":"+pad(m)); return a; })();
  function openTimeMenu(input) {
    closeTimeMenu();
    const rect=input.getBoundingClientRect();
    const menu=document.createElement("div"); menu.className="time-menu";
    const cur=normalizeTime(input.value);
    menu.innerHTML=TIME_OPTIONS.map(t=>`<button type="button" class="${t===cur?"active":""}" data-t="${t}">${t}</button>`).join("");
    document.body.appendChild(menu);
    const left=Math.min(rect.left,window.innerWidth-150); const top=Math.min(rect.bottom+4,window.innerHeight-220);
    menu.style.left=Math.max(8,left)+"px"; menu.style.top=Math.max(8,top)+"px";
    menu.querySelectorAll("button").forEach(b=>b.onclick=()=>{ input.value=b.dataset.t; closeTimeMenu(); input.focus(); });
    setTimeout(()=>document.addEventListener("mousedown",handleOutsideTimeMenu,{once:false}),0);
  }
  function handleOutsideTimeMenu(e){ if(!e.target.closest(".time-menu")&&!e.target.closest(".time-pick-btn")) closeTimeMenu(); }
  function closeTimeMenu(){ const m=document.querySelector(".time-menu"); if(m) m.remove(); document.removeEventListener("mousedown",handleOutsideTimeMenu); }
  function bindTimeInput(input){
    if(!input) return;
    input.addEventListener("input",()=>{ let v=input.value.replace(/[^0-9:]/g,""); if(/^\d{3,4}$/.test(v)) v=v.slice(0,-2)+":"+v.slice(-2); input.value=v.slice(0,5); });
    input.addEventListener("blur",()=>{ input.value=normalizeTime(input.value); });
  }

  /* ─────────────────────────────────────────────────────────────
     Date helpers
  ───────────────────────────────────────────────────────────── */
  function getPeriodRange() {
    const d = cloneDate(state.cursor);
    if(state.view==="month") return { from:new Date(d.getFullYear(),d.getMonth(),1), to:new Date(d.getFullYear(),d.getMonth()+1,0) };
    const from=mondayOf(d); const to=cloneDate(from); to.setDate(to.getDate()+6); return { from, to };
  }
  function getPeriodTitle() {
    const d=state.cursor;
    if(state.view==="month") return `${d.getFullYear()}년 ${pad(d.getMonth()+1)}월`;
    if(state.view==="list") return `${d.getFullYear()}년 ${pad(d.getMonth()+1)}월`;
    const r=getPeriodRange(); return `${ymd(r.from)} ~ ${ymd(r.to)}`;
  }
  function movePeriod(delta) {
    const d=cloneDate(state.cursor);
    if(state.view==="month"||state.view==="list") d.setMonth(d.getMonth()+delta);
    else d.setDate(d.getDate()+delta*7);
    state.cursor=d; reloadAndRender();
  }

  /* ─────────────────────────────────────────────────────────────
     Data loading
  ───────────────────────────────────────────────────────────── */
  async function loadCategories() {
    try {
      const r=await jsonp("getScheduleCategories",userParams());
      state.categories = r.success&&Array.isArray(r.categories) ? r.categories : DEFAULT_CATEGORIES;
    } catch(e){ state.categories=DEFAULT_CATEGORIES; }
  }

  async function loadSchedules() {
    const r=getPeriodRange();
    const params=Object.assign({},userParams(),{ from_date:ymd(r.from), to_date:ymd(r.to) });
    if(state.scope==="mine") params.main_user_id=state.user.user_id;
    if(state.scope==="part") params.part=state.filterPart||state.user.part;
    if(state.filterCategory) params.category=state.filterCategory;
    if(state.filterStatus) params.status=state.filterStatus;
    try {
      const res=await jsonp("getSchedules",params);
      if(isApiError(res)) throw new Error("스케쥴 API를 찾을 수 없습니다. Apps Script를 최신 버전으로 배포해 주세요.");
      if(!res.success) throw new Error(res.message||"스케쥴 조회 실패");
      let list=(Array.isArray(res.schedules)?res.schedules:[]).map(s=>Object.assign({},s,{start_time:formatTime(s.start_time),end_time:formatTime(s.end_time)}));
      if(state.filterPerson) { const k=state.filterPerson.toLowerCase(); list=list.filter(s=>String(s.main_user_name||"").toLowerCase().includes(k)); }
      if(state.scope==="part"&&!state.filterPart&&state.user.part) list=list.filter(s=>s.part===state.user.part);
      /* 취소 상태는 명시적으로 필터 선택 시에만 표시 */
      if(!state.filterStatus) list=list.filter(s=>s.status!=="취소");
      state.schedules=list;
    } catch(e){ toast(e.message); state.schedules=[]; }
  }

  async function reloadAndRender() {
    showBusy("불러오는 중...");
    try { await loadSchedules(); } finally { hideBusy(); }
    renderCalendar(); renderSide();
  }

  /* ─────────────────────────────────────────────────────────────
     Filtering
  ───────────────────────────────────────────────────────────── */
  function filteredSchedules() {
    return state.schedules.filter(s => !state.hiddenParts.has(s.part||"미지정"));
  }

  function schedulesForDate(dateStr) {
    return filteredSchedules().filter(s=>s.date===dateStr);
  }

  /* ─────────────────────────────────────────────────────────────
     Render Shell
  ───────────────────────────────────────────────────────────── */
  const root = document.getElementById("root");

  function renderLogin() {
    root.innerHTML=`
      <div class="login-wrap">
        <h2>스케쥴 관리</h2>
        <p>HAK QM 포털과 동일한 이름/사번으로 로그인합니다.<br>포털에서 이미 로그인했다면 새로고침 후 자동 연동됩니다.</p>
        <div class="login-grid">
          <input id="lName" class="control" placeholder="이름" style="min-height:40px;" />
          <input id="lEmp" class="control" placeholder="사번" style="min-height:40px;" />
          <button id="lBtn" class="btn primary" style="white-space:nowrap;">로그인</button>
        </div>
      </div>`;
    const doLogin=async()=>{
      const name=document.getElementById("lName").value.trim();
      const emp_no=document.getElementById("lEmp").value.trim();
      if(!name||!emp_no){ toast("이름과 사번을 입력해주세요."); return; }
      const btn=document.getElementById("lBtn"); btn.disabled=true; btn.textContent="로그인 중...";
      try {
        const r=await jsonp("login",{name,emp_no});
        if(!r.success) throw new Error(r.message||"로그인 실패");
        saveUser(r.user); initApp();
      } catch(e){ toast(e.message); }
      finally{ btn.disabled=false; btn.textContent="로그인"; }
    };
    document.getElementById("lBtn").onclick=doLogin;
    document.getElementById("lEmp").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
  }

  function renderShell() {
    root.innerHTML=`
      <div class="topbar">
        <span class="topbar-logo">HAK HQAA</span>
        <span class="topbar-sep">|</span>
        <span class="topbar-title">검사/업무 스케쥴</span>
        <div class="topbar-user">
          <span class="topbar-chip">${esc(state.user.name)}</span>
          <span class="topbar-chip part">${esc(state.user.part||"파트 미지정")}</span>
          <button class="save-pending-btn" id="savePendingBtn" style="display:none;">상태 저장 (0)</button>
          <button class="topbar-btn" id="newBtn">+ 일정 등록</button>
          <button class="topbar-btn" id="reloadBtn">새로고침</button>
        </div>
      </div>
      <div class="shell">
        <aside class="side" id="sidePanel"></aside>
        <div class="main">
          <div class="view-bar">
            <div class="view-bar-left">
              <button class="nav-btn" id="prevBtn">‹</button>
              <span class="period-title" id="periodTitle"></span>
              <button class="nav-btn" id="nextBtn">›</button>
              <button class="today-btn" id="todayBtn">오늘</button>
            </div>
            <div class="view-bar-right">
              <div class="seg" id="viewSeg">
                <button data-v="month" class="${state.view==="month"?"active":""}">월</button>
                <button data-v="week"  class="${state.view==="week"?"active":""}">주</button>
                <button data-v="list"  class="${state.view==="list"?"active":""}">목록</button>
              </div>
            </div>
          </div>
          <div class="scope-bar">
            <div class="scope-tabs" id="scopeTabs">
              <button class="scope-tab ${state.scope==="mine"?"active":""}" data-scope="mine">내 일정</button>
              <button class="scope-tab ${state.scope==="part"?"active":""}" data-scope="part">파트별</button>
              <button class="scope-tab ${state.scope==="team"?"active":""}" data-scope="team">팀 전체</button>
            </div>
            <select class="scope-select" id="partSel" style="${state.scope==="part"?"":"display:none"}">
              <option value="">내 파트</option>
              ${PARTS.map(p=>`<option value="${esc(p)}" ${state.filterPart===p?"selected":""}>${esc(p)}</option>`).join("")}
            </select>
            <input id="personSearch" class="search-input" placeholder="담당자 검색" value="${esc(state.filterPerson)}" />
            <select class="scope-select" id="catSel">
              <option value="">구분 전체</option>
              ${(state.categories.length?state.categories:DEFAULT_CATEGORIES).map(c=>`<option value="${esc(c.category)}" ${state.filterCategory===c.category?"selected":""}>${esc(c.display_name)}</option>`).join("")}
            </select>
            <select class="scope-select" id="statusSel">
              <option value="">상태 전체</option>
              ${STATUS_OPTIONS.map(s=>`<option value="${esc(s)}" ${state.filterStatus===s?"selected":""}>${esc(s)}</option>`).join("")}
            </select>
            <div class="scope-bar-right">
              <div class="kpi-strip" id="kpiStrip"></div>
            </div>
          </div>
          <div class="cal-wrap" id="calWrap"></div>
        </div>
      </div>`;
    bindShellEvents();
  }

  function bindShellEvents() {
    document.getElementById("newBtn").onclick=()=>openForm(null);
    document.getElementById("reloadBtn").onclick=reloadAndRender;
    document.getElementById("prevBtn").onclick=()=>movePeriod(-1);
    document.getElementById("nextBtn").onclick=()=>movePeriod(1);
    document.getElementById("todayBtn").onclick=()=>{ state.cursor=new Date(); reloadAndRender(); };
    document.querySelectorAll("#viewSeg button").forEach(b=>b.onclick=()=>{ state.view=b.dataset.v; renderCalendar(); renderSide(); updateViewSeg(); updatePeriodTitle(); });
    const partSel=document.getElementById("partSel");
    /* 스코프 탭 */
    document.querySelectorAll("#scopeTabs .scope-tab").forEach(btn=>{
      btn.onclick=()=>{
        state.scope=btn.dataset.scope;
        document.querySelectorAll("#scopeTabs .scope-tab").forEach(b=>b.classList.toggle("active",b===btn));
        partSel.style.display=state.scope==="part"?"":"none";
        reloadAndRender();
      };
    });
    partSel.onchange=()=>{ state.filterPart=partSel.value; reloadAndRender(); };
    const personSearch=document.getElementById("personSearch");
    let st=null; personSearch.addEventListener("input",()=>{ clearTimeout(st); st=setTimeout(()=>{ state.filterPerson=personSearch.value.trim(); reloadAndRender(); },350); });
    document.getElementById("catSel").onchange=e=>{ state.filterCategory=e.target.value; reloadAndRender(); };
    document.getElementById("statusSel").onchange=e=>{ state.filterStatus=e.target.value; reloadAndRender(); };
    const savePendingBtn=document.getElementById("savePendingBtn");
    if(savePendingBtn) savePendingBtn.onclick=savePendingChanges;
  }

  function updateViewSeg() {
    document.querySelectorAll("#viewSeg button").forEach(b=>b.classList.toggle("active",b.dataset.v===state.view));
  }
  function updatePeriodTitle() {
    const el=document.getElementById("periodTitle"); if(el) el.textContent=getPeriodTitle();
  }
  function updateKpi() {
    const list=filteredSchedules();
    const effStatus=s=>state.pendingStatusChanges[s.schedule_id]||s.status||"예정";
    const total=list.length;
    const active=list.filter(s=>["예정","확정","진행"].includes(effStatus(s))).length;
    const done=list.filter(s=>effStatus(s)==="완료").length;
    const pending=Object.keys(state.pendingStatusChanges).length;
    const el=document.getElementById("kpiStrip");
    if(el) el.innerHTML=`<span class="kpi-chip total">${total}건</span><span class="kpi-chip active">진행중 ${active}</span><span class="kpi-chip done">완료 ${done}</span>${pending>0?`<span class="kpi-chip" style="background:#fff7ed;color:#c2410c;">미저장 ${pending}</span>`:""}`;
  }
  function updateSavePendingBtn() {
    const count=Object.keys(state.pendingStatusChanges).length;
    const btn=document.getElementById("savePendingBtn");
    if(btn){ btn.style.display=count>0?"":"none"; btn.textContent=`상태 저장 (${count})`; }
  }

  /* ─────────────────────────────────────────────────────────────

        ${PARTS.map(p=>{

            <span class="legend-dot" style="background:${col}"></span>
            <span class="legend-label">${esc(p)}</span>

      el.onclick=()=>{
        const p=el.dataset.legendPart;

        renderSide(); renderCalendar(); updateKpi();

  function renderMiniCal() {
    const grid=document.getElementById("miniCalGrid"); if(!grid) return;
    const mc=state.miniCalDate;
    const year=mc.getFullYear(), month=mc.getMonth();
    const firstDay=new Date(year,month,1);
    const lastDay=new Date(year,month+1,0);
    const startDow=firstDay.getDay(); // 0=Sun
    const today=todayStr();
    const cursorStr=ymd(state.cursor);
    const scheduleDates=new Set(state.schedules.map(s=>s.date));

    let html='<div class="mc-day-name">일</div><div class="mc-day-name">월</div><div class="mc-day-name">화</div><div class="mc-day-name">수</div><div class="mc-day-name">목</div><div class="mc-day-name">금</div><div class="mc-day-name">토</div>';

    for(let i=0;i<startDow;i++){
      const d=new Date(year,month,1-startDow+i);
      html+=`<div class="mc-day other-month" data-date="${ymd(d)}">${d.getDate()}</div>`;
    }
    for(let d=1;d<=lastDay.getDate();d++){
      const dt=new Date(year,month,d); const dStr=ymd(dt);
      const cls=["mc-day", dStr===today?"today":"", dStr===cursorStr&&dStr!==today?"selected":"", scheduleDates.has(dStr)?"has-events":""].filter(Boolean).join(" ");
      html+=`<div class="${cls}" data-date="${dStr}">${d}</div>`;
    }
    grid.innerHTML=html;
    grid.querySelectorAll(".mc-day[data-date]").forEach(el=>{
      el.onclick=()=>{
        const d=parseDate(el.dataset.date);
        if(!d) return;
        state.cursor=d;
        if(state.view==="month"){ state.miniCalDate=new Date(d.getFullYear(),d.getMonth(),1); reloadAndRender(); }
        else { reloadAndRender(); }
      };
    });

  /* ─────────────────────────────────────────────────────────────
     Month View
  ───────────────────────────────────────────────────────────── */
  function renderMonth() {
    const wrap=document.getElementById("calWrap"); if(!wrap) return;
    const d=state.cursor;
    const firstDay=new Date(d.getFullYear(),d.getMonth(),1);
    const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0);
    const startDow=firstDay.getDay();
    const today=todayStr();

    const days=[];
    for(let i=0;i<startDow;i++){ const dt=new Date(d.getFullYear(),d.getMonth(),1-startDow+i); days.push({dt,other:true}); }
    for(let i=1;i<=lastDay.getDate();i++){ days.push({dt:new Date(d.getFullYear(),d.getMonth(),i),other:false}); }
    const remainder=(7-days.length%7)%7;
    for(let i=1;i<=remainder;i++){ days.push({dt:new Date(d.getFullYear(),d.getMonth()+1,i),other:true}); }

    let html=`<div class="month-grid">`;
    html+=["일","월","화","수","목","금","토"].map(n=>`<div class="month-dh">${n}</div>`).join("");
    days.forEach(({dt,other})=>{
      const dStr=ymd(dt);
      const isToday=dStr===today;
      const events=schedulesForDate(dStr).sort((a,b)=>(a.start_time||"99:99").localeCompare(b.start_time||"99:99"));
      const maxShow=3;
      const shown=events.slice(0,maxShow);
      const extra=events.length-maxShow;
      html+=`<div class="month-cell ${other?"other-month":""} ${isToday?"today":""}" data-date="${dStr}">
        <span class="mc-date-num">${dt.getDate()}</span>
        ${shown.map(s=>{
          const col=eventColor(s);
          const dot=partDot(s.part);
          return `<div class="event-chip" data-sid="${esc(s.schedule_id)}" style="${chipStyle(s)}" title="${esc(s.title||s.schedule_id)}">
            <span class="chip-dot" style="background:${dot}"></span>
            <span class="chip-text">${esc(s.main_user_name||"")} ${esc(s.title||"일정")}</span>
          </div>`;
        }).join("")}
        ${extra>0?`<div class="more-chip" data-date="${dStr}">+${extra}개 더</div>`:""}
      </div>`;
    });
    html+=`</div>`;
    wrap.innerHTML=html;

    wrap.querySelectorAll(".event-chip[data-sid]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openPopover(el.dataset.sid,el); });
    wrap.querySelectorAll(".more-chip[data-date]").forEach(el=>el.onclick=()=>openDayDetail(el.dataset.date));
    wrap.querySelectorAll(".month-cell[data-date]").forEach(el=>el.ondblclick=()=>{ openForm(null,el.dataset.date); });
  }

  /* ─────────────────────────────────────────────────────────────
     Week View
  ───────────────────────────────────────────────────────────── */
  function renderWeek() {
    const wrap=document.getElementById("calWrap"); if(!wrap) return;
    const r=getPeriodRange();
    const days=[];
    for(let i=0;i<7;i++){ const dt=cloneDate(r.from); dt.setDate(dt.getDate()+i); days.push(dt); }
    const today=todayStr();

    const isMine=state.scope==="mine"&&!state.filterPerson;
    if(!isMine) { renderWeekOverview(days); return; }

    /* Time-based week grid — 08:00 to 20:00 */
    const HOUR_START=8, HOUR_END=20;
    const SLOT_H=52; /* px per hour */
    const hours=Array.from({length:HOUR_END-HOUR_START+1},(_,i)=>i+HOUR_START);
    let html=`<div class="week-wrap">
      <div class="week-time-col">
        <div class="week-time-head"></div>
        ${hours.map(h=>`<div class="week-time-slot" style="height:${SLOT_H}px;">${pad(h)}:00</div>`).join("")}
      </div>
      <div class="week-days">`;

    days.forEach(dt=>{
      const dStr=ymd(dt);
      const isToday=dStr===today;
      const events=schedulesForDate(dStr).sort((a,b)=>(a.start_time||"").localeCompare(b.start_time||""));
      /* 시간 범위 밖(08:00 이전 or 20:00 이후)이거나 시간 없는 일정 → 종일 표시 */
      const allDay=events.filter(s=>{
        if(!s.start_time) return true;
        const [h]=s.start_time.split(":").map(Number);
        return h<HOUR_START||h>=HOUR_END;
      });
      const timed=events.filter(s=>{
        if(!s.start_time) return false;
        const [h]=s.start_time.split(":").map(Number);
        return h>=HOUR_START&&h<HOUR_END;
      });

      html+=`<div class="week-day-col">
        <div class="week-dh ${isToday?"today":""}">
          <div class="week-dh-name">${weekdayShort(dt)}</div>
          <div class="week-dh-num">${dt.getDate()}</div>
        </div>
        <div class="week-allday">
          ${allDay.map(s=>`<div class="event-chip" data-sid="${esc(s.schedule_id)}" style="${chipStyle(s)};margin-bottom:3px;">
            <span class="chip-dot" style="background:${partDot(s.part)}"></span>
            <span class="chip-text">${esc(s.main_user_name||"")} ${esc(s.title||"일정")}</span>
          </div>`).join("")}
          ${allDay.length===0?`<div style="color:#cbd5e1;font-size:10px;padding:2px 4px;">종일 없음</div>`:""}
        </div>
        <div class="week-timed" style="position:relative;height:${(HOUR_END-HOUR_START)*SLOT_H}px;">
          ${hours.slice(0,-1).map((h,i)=>`<div class="week-slot" style="position:absolute;top:${i*SLOT_H}px;height:${SLOT_H}px;left:0;right:0;border-bottom:1px solid var(--line2);"></div>`).join("")}
          ${timed.map(s=>{
            const st=s.start_time||"08:00", en=s.end_time||"";
            const [sh,sm]=st.split(":").map(Number);
            const [eh,em]=en?en.split(":").map(Number):[Math.min(sh+1,HOUR_END),0];
            const clampSh=Math.max(sh,HOUR_START), clampEh=Math.min(eh,HOUR_END);
            const top=(clampSh-HOUR_START)*SLOT_H+sm*(SLOT_H/60);
            const height=Math.max(24,(clampEh*60+em-(clampSh*60+sm))*(SLOT_H/60));
            const col=eventColor(s);
            return `<div class="timed-event" data-sid="${esc(s.schedule_id)}"
              style="top:${top}px;height:${height}px;background:${col}22;border-left:3px solid ${col};color:${col};">
              <div class="ev-time">${esc(st)}${en?" ~ "+esc(en):""}</div>
              <div class="ev-title">${esc(s.main_user_name||"")} ${esc(s.title||"일정")}</div>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
    wrap.innerHTML=html;
    wrap.querySelectorAll("[data-sid]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openPopover(el.dataset.sid,el); });
  }

  function renderWeekOverview(days) {
    const wrap=document.getElementById("calWrap"); if(!wrap) return;
    const today=todayStr();
    const r=getPeriodRange();
    const allEvents=filteredSchedules();

    let html=`<div class="overview-grid">`;
    const activeParts=PARTS.filter(p=>allEvents.some(s=>(s.part||"미지정")===p));
    if(!activeParts.length&&allEvents.length===0){
      html+=`<div style="text-align:center;padding:48px;color:#94a3b8;font-weight:800;">이 기간에 등록된 일정이 없습니다.</div>`;
    }
    const showParts=activeParts.length ? activeParts : PARTS;
    showParts.forEach(part=>{
      const col=PART_DOT_COLORS[part]||"#94a3b8";
      const evs=allEvents.filter(s=>(s.part||"미지정")===part);
      const weekEvs=evs.filter(s=>{ const d=parseDate(s.date); return d&&d>=r.from&&d<=r.to; });
      if(weekEvs.length===0&&state.scope!=="team") return;
      html+=`<div class="team-row">
        <div class="team-row-head">
          <div class="team-color-bar" style="background:${col}"></div>
          <span class="team-row-name">${esc(part)}</span>
          <span class="team-row-count">${weekEvs.length}건</span>
        </div>
        <div class="team-events">
          ${weekEvs.length ? weekEvs.sort((a,b)=>a.date.localeCompare(b.date)||(a.start_time||"").localeCompare(b.start_time||"")).map(s=>{
            const col2=PART_DOT_COLORS[s.part]||"#94a3b8";
            return `<div class="team-event-card" data-sid="${esc(s.schedule_id)}">
              <span class="team-event-dot" style="background:${col2}"></span>
              <div class="team-event-body">
                <div class="team-event-title">${esc(s.title||"일정")}</div>
                <div class="team-event-meta">${esc(s.date)} ${esc(displayTime(s)||"")} · ${esc(s.main_user_name||"-")}</div>
              </div>
            </div>`;
          }).join("") : `<div class="team-empty">이 기간 일정 없음</div>`}
        </div>
      </div>`;
    });
    html+=`</div>`;
    wrap.innerHTML=html;
    wrap.querySelectorAll(".team-event-card[data-sid]").forEach(el=>el.onclick=()=>openPopover(el.dataset.sid,el));
  }

  /* ─────────────────────────────────────────────────────────────
     List View
  ───────────────────────────────────────────────────────────── */
  function renderList() {
    const wrap=document.getElementById("calWrap"); if(!wrap) return;
    const r=getPeriodRange();
    const days=[];
    for(let dt=cloneDate(r.from);dt<=r.to;dt.setDate(dt.getDate()+1)) days.push(ymd(dt));
    const today=todayStr();
    const sorted=[...filteredSchedules()].sort((a,b)=>a.date.localeCompare(b.date)||(a.start_time||"99:99").localeCompare(b.start_time||"99:99"));

    const byDate={};
    sorted.forEach(s=>{ if(!byDate[s.date]) byDate[s.date]=[];  byDate[s.date].push(s); });

    const datesWithEvents=days.filter(d=>byDate[d]);
    if(!datesWithEvents.length){ wrap.innerHTML=`<div class="list-wrap"><div style="text-align:center;padding:48px;color:#94a3b8;font-weight:800;">이 기간에 등록된 일정이 없습니다.</div></div>`; return; }

    let html=`<div class="list-wrap">`;
    datesWithEvents.forEach(dStr=>{
      const dt=parseDate(dStr);
      const dow=dt?["일","월","화","수","목","금","토"][dt.getDay()]:"";
      html+=`<div class="list-date-group">
        <div class="list-date-label">
          ${esc(dStr)} (${esc(dow)})
          ${dStr===today?`<span class="list-date-today-badge">오늘</span>`:""}
          <span style="color:#94a3b8;font-size:11px;font-weight:800;">${byDate[dStr].length}건</span>
        </div>
        ${byDate[dStr].map(s=>{
          const ci=categoryInfo(s.category);
          return `<div class="list-event" data-sid="${esc(s.schedule_id)}">
            <div class="list-event-bar" style="${barStyle(s)}"></div>
            <span class="list-event-time">${esc(displayTime(s)||"종일")}</span>
            <div class="list-event-body">
              <div class="list-event-title">${esc(s.title||"일정")}</div>
              <div class="list-event-meta">${esc(s.main_user_name||"-")} · ${esc(s.part||"-")} ${s.location?`· ${esc(s.location)}`:""}</div>
            </div>
            <div class="list-event-badges">
              <span class="badge ${CAT_BADGE[s.category]||"b-etc"}">${esc(ci.display_name)}</span>
              <span class="badge b-status">${esc(s.status||"예정")}</span>
            </div>
          </div>`;
        }).join("")}
      </div>`;
    });
    html+=`</div>`;
    wrap.innerHTML=html;
    wrap.querySelectorAll(".list-event[data-sid]").forEach(el=>el.onclick=()=>openPopover(el.dataset.sid,el));
  }

  /* ─────────────────────────────────────────────────────────────
     Main render dispatcher
  ───────────────────────────────────────────────────────────── */
  function renderCalendar() {
    updatePeriodTitle();
    updateKpi();
    if(state.view==="month") renderMonth();
    else if(state.view==="week") renderWeek();
    else renderList();
  }

     Day detail popup (for "+N more")

      <div class="popover-color-bar" style="background:#2563eb"></div>

    <div class="popover-actions">
      ${editable?`<button class="popover-btn danger" id="pCancelBtn">삭제</button>`:""}
      ${editable?`<button class="popover-btn primary" id="pEditBtn">수정</button>`:"<button class='popover-btn' id='pEditBtn'>상세 보기</button>"}
    </div>`;
    document.body.appendChild(pop);

    /* Position */
    const rect=anchorEl.getBoundingClientRect();
    const pw=340, ph=300;
    let left=rect.right+8; if(left+pw>window.innerWidth-8) left=rect.left-pw-8;
    let top=rect.top; if(top+ph>window.innerHeight-8) top=window.innerHeight-ph-8;
    pop.style.left=Math.max(8,left)+"px"; pop.style.top=Math.max(8,top)+"px";

    pop.querySelector(".popover-close").onclick=closePopover;
    const editBtn=pop.querySelector("#pEditBtn"); if(editBtn) editBtn.onclick=()=>{ closePopover(); openForm(s); };
    const cancelBtn=pop.querySelector("#pCancelBtn"); if(cancelBtn) cancelBtn.onclick=()=>{ closePopover(); doCancel(s); };
    /* 상태 변경 — 큐에 담고 일괄 저장 */
    const statusColors={예정:"#475569",확정:"#2563eb",진행:"#059669",완료:"#16a34a",취소:"#dc2626",보류:"#d97706"};
    pop.querySelectorAll(".status-pill[data-status][data-sid]").forEach(btn=>{
      btn.onclick=(ev)=>{
        ev.stopPropagation();
        const newStatus=btn.dataset.status;
        const curEff=state.pendingStatusChanges[s.schedule_id]||s.status||"예정";
        if(newStatus===curEff) return;
        queueStatus(s.schedule_id, newStatus, null);
        /* 팝오버 내 시각 업데이트 */
        pop.querySelectorAll(".status-pill").forEach(b=>{
          const col=statusColors[b.dataset.status]||"#475569";
          b.classList.remove("active");
          b.style.background=""; b.style.color=col; b.style.borderColor=`${col}40`;
        });
        const selCol=statusColors[newStatus]||"#475569";
        btn.classList.add("active");
        btn.style.background=selCol; btn.style.color="#fff"; btn.style.borderColor=selCol;
        renderCalendar(); updateKpi();
      };
    });
    setTimeout(()=>document.addEventListener("mousedown",e=>{ if(!pop.contains(e.target)) closePopover(); },{once:true}),0);
  }

  /* ─────────────────────────────────────────────────────────────
     Status change queuing
  ───────────────────────────────────────────────────────────── */
  function queueStatus(id, status, el) {
    const s=state.schedules.find(x=>x.schedule_id===id); if(!s) return;
    if(!s._origStatus) s._origStatus=s.status; /* 원본 저장 */
    if(status===s._origStatus) {
      delete state.pendingStatusChanges[id];
      s.status=s._origStatus;
    } else {
      state.pendingStatusChanges[id]=status;
      s.status=status; /* 로컬 즉시 반영 (낙관적 UI) */
    }
    if(el) el.classList.toggle("is-pending",!!state.pendingStatusChanges[id]);
    updateSavePendingBtn();
    toast("상태 변경됨 — 상단 '상태 저장' 버튼을 눌러 저장하세요.");
  }

  async function savePendingChanges() {
    const changes=Object.entries(state.pendingStatusChanges); if(!changes.length) return;
    showBusy(`상태 저장 중... (0/${changes.length})`);
    let ok=0, fail=0;
    for(const [id,status] of changes) {
      try {
        const r=await jsonp("updateSchedule",Object.assign({},userParams(),{schedule_id:id,status}));
        if(!r.success) throw new Error(r.message);
        const s=state.schedules.find(x=>x.schedule_id===id);
        if(s){ s.status=status; delete s._origStatus; }
        delete state.pendingStatusChanges[id]; ok++;
        showBusy(`상태 저장 중... (${ok}/${changes.length})`);
      } catch(e){
        /* 실패 시 로컬 원본 복원 */
        const s=state.schedules.find(x=>x.schedule_id===id);
        if(s&&s._origStatus){ s.status=s._origStatus; delete s._origStatus; }
        fail++;
      }
    }
    hideBusy();
    toast(fail ? `저장 ${ok}건 성공, ${fail}건 실패` : `${ok}건 상태가 저장되었습니다.`);
    updateSavePendingBtn(); renderCalendar(); updateKpi();
  }

  /* ─────────────────────────────────────────────────────────────
     Form Modal
  ───────────────────────────────────────────────────────────── */
  function openForm(schedule, preDate) {
    const isNew=!schedule;
    const data=schedule?{...schedule}:{
      schedule_id:"", date:preDate||ymd(state.cursor), category:"INSPECTION",
      title:"", start_time:"09:00", end_time:"", location:"", customer:"",
      memo:"", project_no:"", item_code:"", qty:"", sub_user_names:"",
      status:"예정", priority:"일반", visibility:"팀",
      part:state.user.part||"", main_user_id:state.user.user_id, main_user_name:state.user.name
    };
    const editable=canEdit(schedule);
    const cats=(state.categories.length?state.categories:DEFAULT_CATEGORIES);
    const partOpts=PARTS.map(p=>`<option value="${esc(p)}" ${data.part===p?"selected":""}>${esc(p)}</option>`).join("");

    const bd=document.createElement("div"); bd.className="modal-backdrop";
    bd.innerHTML=`<div class="modal-card">
      <div class="modal-head">
        <h3>${isNew?"일정 등록":"일정 상세 / 수정"}</h3>
        <button class="modal-close">×</button>
      </div>
      <div class="modal-body">
        ${!editable?`<div style="padding:8px 12px;background:#fff7ed;border-radius:10px;font-size:12px;color:#b45309;margin-bottom:12px;">이 일정은 조회만 가능합니다.</div>`:""}
        <div class="form-grid">
          <div class="field">
            <label>날짜</label>
            <input id="fDate" type="date" class="control" value="${esc(data.date)}" ${!editable?"disabled":""}/>
          </div>
          <div class="field">
            <label>구분</label>
            <select id="fCat" class="control" ${!editable?"disabled":""}>
              ${cats.map(c=>`<option value="${esc(c.category)}" ${data.category===c.category?"selected":""}>${esc(c.display_name)}</option>`).join("")}
            </select>
          </div>
          <div class="field full">
            <label>스케쥴명</label>
            <input id="fTitle" class="control" value="${esc(data.title)}" placeholder="예: HMD-2880 ACAP 검사" ${!editable?"disabled":""}/>
          </div>
          <div class="field">
            <label>시작 시간</label>
            <div class="time-wrap">
              <input id="fStart" type="text" inputmode="numeric" class="control" value="${esc(formatTime(data.start_time)||"09:00")}" maxlength="5" placeholder="09:00" ${!editable?"disabled":""}/>
              ${editable?`<button type="button" class="time-pick-btn" data-target="fStart">⌄</button>`:""}
            </div>
          </div>
          <div class="field">
            <label>종료 시간</label>
            <div class="time-wrap">
              <input id="fEnd" type="text" inputmode="numeric" class="control" value="${esc(formatTime(data.end_time))}" maxlength="5" placeholder="10:00" ${!editable?"disabled":""}/>
              ${editable?`<button type="button" class="time-pick-btn" data-target="fEnd">⌄</button>`:""}
            </div>
          </div>
          <div class="field">
            <label>상태</label>
            <select id="fStatus" class="control" ${!editable?"disabled":""}>
              ${STATUS_OPTIONS.map(s=>`<option value="${s}" ${(data.status||"예정")===s?"selected":""}>${s}</option>`).join("")}
            </select>
          </div>
          <div class="field">
            <label>장소</label>
            <input id="fLoc" class="control" value="${esc(data.location)}" ${!editable?"disabled":""}/>
          </div>
          <div class="field">
            <label>고객/업체</label>
            <input id="fCust" class="control" value="${esc(data.customer)}" ${!editable?"disabled":""}/>
          </div>
          <div class="field full">
            <label>메모</label>
            <textarea id="fMemo" class="control" ${!editable?"disabled":""}>${esc(data.memo)}</textarea>
          </div>
        </div>
        <details class="advanced">
          <summary>상세 입력</summary>
          <div class="adv-inner">
            <div class="field"><label>프로젝트/호선</label><input id="fProj" class="control" value="${esc(data.project_no)}" ${!editable?"disabled":""}/></div>
            <div class="field"><label>품목/Item</label><input id="fItem" class="control" value="${esc(data.item_code)}" ${!editable?"disabled":""}/></div>
            <div class="field"><label>수량</label><input id="fQty" class="control" value="${esc(data.qty)}" placeholder="예: 2EA" ${!editable?"disabled":""}/></div>
            <div class="field"><label>동행/참조자</label><input id="fSub" class="control" value="${esc(data.sub_user_names)}" ${!editable?"disabled":""}/></div>
            <div class="field"><label>우선순위</label>
              <select id="fPrio" class="control" ${!editable?"disabled":""}>
                ${["일반","중요","긴급"].map(v=>`<option ${(data.priority||"일반")===v?"selected":""}>${v}</option>`).join("")}
              </select>
            </div>
            <div class="field"><label>공개 범위</label>
              <select id="fVis" class="control" ${!editable?"disabled":""}>
                ${["팀","파트","개인"].map(v=>`<option ${(data.visibility||"팀")===v?"selected":""}>${v}</option>`).join("")}
              </select>
            </div>
            <div class="field"><label>파트</label><select id="fPart" class="control" ${!editable||!isAdmin()?"disabled":""}>${partOpts}</select></div>
            <div class="field"><label>담당자명</label><input id="fMainName" class="control" value="${esc(data.main_user_name)}" ${!editable||!isAdmin()?"disabled":""}/></div>
            <div class="field"><label>담당자 ID</label><input id="fMainId" class="control" value="${esc(data.main_user_id)}" ${!editable||!isAdmin()?"disabled":""}/></div>
          </div>
        </details>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-left">
          ${isNew?`<button class="btn" id="loadLastBtn">최근 입력 불러오기</button>`:""}
          ${!isNew&&editable?`<button class="btn danger" id="cancelSchBtn">일정 삭제</button>`:""}
        </div>
        <div class="modal-footer-right">
          <button class="btn" id="closeFormBtn">닫기</button>
          ${editable?`<button class="btn primary" id="saveFormBtn">저장</button>`:""}
        </div>
      </div>
    </div>`;
    document.body.appendChild(bd);

    bindTimeInput(bd.querySelector("#fStart")); bindTimeInput(bd.querySelector("#fEnd"));
    bd.querySelectorAll(".time-pick-btn").forEach(b=>b.onclick=ev=>{ ev.preventDefault(); const inp=bd.querySelector("#"+b.dataset.target); if(inp&&!inp.disabled) openTimeMenu(inp); });

    bd.querySelector(".modal-close").onclick=()=>bd.remove();
    bd.querySelector("#closeFormBtn").onclick=()=>bd.remove();
    bd.onclick=e=>{ if(e.target===bd) bd.remove(); };

    const loadLast=bd.querySelector("#loadLastBtn");
    if(loadLast) loadLast.onclick=()=>{
      const saved=localStorage.getItem(LAST_INPUT_KEY); if(!saved){ toast("최근 입력값이 없습니다."); return; }
      try {
        const d=JSON.parse(saved);
        const s=(id,v)=>{ const el=bd.querySelector(id); if(el&&v!=null) el.value=v; };
        s("#fCat",d.category); s("#fTitle",d.title); s("#fStart",normalizeTime(d.start_time)); s("#fEnd",normalizeTime(d.end_time));
        s("#fLoc",d.location); s("#fCust",d.customer); s("#fMemo",d.memo); s("#fStatus",d.status);
        s("#fProj",d.project_no); s("#fItem",d.item_code); s("#fQty",d.qty); s("#fSub",d.sub_user_names);
        toast("최근 입력값을 불러왔습니다.");
      } catch(e){ toast("불러오지 못했습니다."); }
    };

    const saveBtn=bd.querySelector("#saveFormBtn");
    if(saveBtn) saveBtn.onclick=()=>doSave(bd,schedule);
    const cancelSchBtn=bd.querySelector("#cancelSchBtn");
    if(cancelSchBtn) cancelSchBtn.onclick=()=>doCancel(schedule,bd);
  }

  async function doSave(bd, schedule) {
    const g=id=>bd.querySelector(id)?.value?.trim()||"";
    const data={
      date:g("#fDate"), category:g("#fCat"), title:g("#fTitle"),
      start_time:normalizeTime(g("#fStart")), end_time:normalizeTime(g("#fEnd")),
      status:g("#fStatus"), location:g("#fLoc"), customer:g("#fCust"),
      memo:bd.querySelector("#fMemo")?.value?.trim()||"",
      project_no:g("#fProj"), item_code:g("#fItem"), qty:g("#fQty"), sub_user_names:g("#fSub"),
      priority:g("#fPrio"), visibility:g("#fVis"),
      part:g("#fPart"), main_user_name:g("#fMainName"), main_user_id:g("#fMainId")
    };
    if(!data.date||!data.category||!data.title){ toast("날짜, 구분, 스케쥴명은 필수입니다."); return; }
    const btn=bd.querySelector("#saveFormBtn"); btn.disabled=true; btn.textContent="저장 중...";
    showBusy("저장 중...");
    try {
      const action=schedule?"updateSchedule":"createSchedule";
      const params=Object.assign({},userParams(),data);
      if(schedule) params.schedule_id=schedule.schedule_id;
      const r=await jsonp(action,params);
      if(!r.success) throw new Error(r.message||"저장 실패");
      localStorage.setItem(LAST_INPUT_KEY,JSON.stringify(data));
      bd.remove(); toast("저장되었습니다."); await reloadAndRender();
    } catch(e){ toast(e.message); }
    finally{ hideBusy(); btn.disabled=false; btn.textContent="저장"; }
  }

  async function doCancel(schedule, bd) {
    if(!confirm("이 일정을 취소(삭제)할까요? 목록에서 제거됩니다.")) return;
    showBusy("처리 중...");
    try {
      const r=await jsonp("cancelSchedule",Object.assign({},userParams(),{schedule_id:schedule.schedule_id}));
      if(!r.success) throw new Error(r.message||"취소 실패");
      /* 로컬 state에서 즉시 제거 → reload 없이 사라짐 */
      state.schedules=state.schedules.filter(s=>s.schedule_id!==schedule.schedule_id);
      delete state.pendingStatusChanges[schedule.schedule_id];
      if(bd) bd.remove();
      toast("일정이 삭제되었습니다.");
      renderCalendar(); renderSide(); updateSavePendingBtn();
    } catch(e){ toast(e.message); }
    finally{ hideBusy(); }
  }

  /* ─────────────────────────────────────────────────────────────
     Init
  ───────────────────────────────────────────────────────────── */
  async function initApp() {
    if(!state.user) state.user=loadSavedUser();
    if(!state.user){ renderLogin(); return; }

    /* auto-refresh user data */
    try {
      if(!state.user.part||!state.user.user_id){
        const r=await jsonp("login",{name:state.user.name,emp_no:state.user.emp_no});
        if(r.success&&r.user) saveUser(r.user);
      }
    } catch(e){}

    /* default scope: mine (개인 일정 먼저) */

    renderShell();
    showBusy("데이터 불러오는 중...");
    await loadCategories();
    await loadSchedules();
    hideBusy();
    renderCalendar();
    renderSide();
  }

  initApp();
</script>
</body>
